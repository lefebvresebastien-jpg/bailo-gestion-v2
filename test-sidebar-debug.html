<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Test sidebar mobile</title>
<style>
  * { box-sizing: border-box; margin:0; padding:0; }
  body { font-family: sans-serif; background:#f5f6fa; }
  .sidebar {
    position: fixed;
    inset: 0 auto 0 0;
    width: 240px;
    background: #16192a;
    display: flex;
    flex-direction: column;
    z-index: 100;
  }
  .sidebar-header {
    flex-shrink: 0;
    padding: 16px;
    color: #fff;
    font-weight: bold;
    border-bottom: 1px solid rgba(255,255,255,.1);
  }
  .sidebar-nav {
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 8px;
  }
  .nav-item {
    display: block;
    padding: 10px 12px;
    color: #ccc;
    text-decoration: none;
    border-radius: 6px;
    margin-bottom: 2px;
    font-size: 14px;
  }
  .sidebar-footer {
    flex-shrink: 0;
    padding: 16px;
    background: #0f1220;
    color: #fff;
    border-top: 2px solid red;
  }
  .label {
    position: fixed;
    top: 10px;
    right: 10px;
    background: yellow;
    padding: 8px;
    font-size: 12px;
    z-index: 999;
  }
</style>
</head>
<body>

<div class="label" id="dims">mesure...</div>

<div class="sidebar">
  <div class="sidebar-header">Bailo Gestion (TEST)</div>
  <nav class="sidebar-nav" id="nav">
    <a href="#" class="nav-item">Tableau de bord</a>
    <a href="#" class="nav-item">Biens</a>
    <a href="#" class="nav-item">Locataires</a>
    <a href="#" class="nav-item">EDL</a>
    <a href="#" class="nav-item">Compteurs</a>
    <a href="#" class="nav-item">Baux</a>
    <a href="#" class="nav-item">Quittances</a>
    <a href="#" class="nav-item">Loyers</a>
    <a href="#" class="nav-item">Banques</a>
    <a href="#" class="nav-item">Messages</a>
    <a href="#" class="nav-item">Documents</a>
    <a href="#" class="nav-item">CAF/APL</a>
    <a href="#" class="nav-item">Décl. occupation</a>
    <a href="#" class="nav-item">Paramètres</a>
    <a href="#" class="nav-item">Dashboard admin</a>
  </nav>
  <div class="sidebar-footer" id="footer">
    <div style="font-size:11px;text-transform:uppercase;opacity:.5;margin-bottom:8px">Modules Bailo (DOIT ETRE VISIBLE)</div>
    <a href="#" class="nav-item">💰 Finance</a>
    <a href="#" class="nav-item">🏗 Chantier</a>
    <div style="display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.1)">
      <div style="width:30px;height:30px;border-radius:50%;background:#3b5bdb;display:flex;align-items:center;justify-content:center">L</div>
      <span>lefebvre@...</span>
    </div>
  </div>
</div>

<script>
function updateDims() {
  document.getElementById('dims').textContent =
    'innerH:' + window.innerHeight +
    ' vh100:' + Math.round(window.innerHeight * 1) +
    ' navScrollH:' + document.getElementById('nav').scrollHeight +
    ' navClientH:' + document.getElementById('nav').clientHeight +
    ' canScroll:' + (document.getElementById('nav').scrollHeight > document.getElementById('nav').clientHeight);
}
window.addEventListener('resize', updateDims);
window.addEventListener('load', updateDims);
setTimeout(updateDims, 300);
</script>

</body>
</html>
