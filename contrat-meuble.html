<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bail meublé — Bailo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    :root { --accent:#e8793a; --ink:#1a110a; --ink-2:#4a3728; --ink-3:#8a7060; --surface:#fdfaf6; --border:rgba(56,37,17,0.12); }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:Georgia,serif; background:#f0ebe4; color:var(--ink); }
    .toolbar { position:fixed; top:0; left:0; right:0; z-index:100; background:#1a110a; color:#fff; display:flex; align-items:center; justify-content:space-between; padding:12px 24px; gap:16px; }
    .toolbar-left { display:flex; align-items:center; gap:12px; }
    .toolbar-title { font-family:Inter,sans-serif; font-size:15px; font-weight:600; }
    .toolbar-sub { font-size:12px; opacity:.6; font-family:Inter,sans-serif; }
    .btn-back { background:rgba(255,255,255,.1); color:#fff; border:none; padding:7px 14px; border-radius:8px; font-size:13px; cursor:pointer; font-family:Inter,sans-serif; }
    .btn-print { background:var(--accent); color:#fff; border:none; padding:8px 20px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; font-family:Inter,sans-serif; }
    .page-wrapper { max-width:860px; margin:0 auto; padding:80px 24px 48px; }
    .contract-preview { background:var(--surface); border-radius:16px; padding:40px 48px; font-family:Georgia,serif; line-height:1.75; border:1px solid var(--border); box-shadow:0 4px 24px rgba(0,0,0,.08); }
    .contract-header { border-bottom:2px solid var(--border); padding-bottom:24px; margin-bottom:28px; text-align:center; }
    .contract-header .label { text-transform:uppercase; letter-spacing:.15em; font-size:.7rem; opacity:.55; margin-bottom:8px; font-family:Inter,sans-serif; }
    .contract-header h3 { font-size:2rem; font-family:"Instrument Serif",Georgia,serif; margin-bottom:6px; }
    .contract-header .subtitle { font-size:.82rem; color:var(--ink-3); font-family:Inter,sans-serif; margin-top:6px; }
    .contract-preview section { margin-top:22px; }
    .contract-preview h4 { font-size:.82rem; font-weight:700; margin-bottom:8px; font-family:Inter,sans-serif; text-transform:uppercase; letter-spacing:.06em; color:var(--accent); border-bottom:1px solid var(--border); padding-bottom:4px; }
    .contract-preview p { margin-bottom:8px; font-size:.91rem; }
    .contract-preview ul { padding-left:22px; margin-bottom:8px; }
    .contract-preview li { font-size:.91rem; margin-bottom:5px; }
    .mention-legale { background:#fef9f5; border:1px solid rgba(232,121,58,.25); border-radius:8px; padding:14px 18px; margin-top:10px; font-size:.82rem; color:var(--ink-3); font-family:Inter,sans-serif; line-height:1.6; }
    .inventaire-table { width:100%; border-collapse:collapse; font-size:.85rem; font-family:Inter,sans-serif; margin-top:10px; }
    .inventaire-table th { background:rgba(56,37,17,.05); padding:7px 10px; text-align:left; border:1px solid var(--border); font-size:.78rem; text-transform:uppercase; letter-spacing:.04em; }
    .inventaire-table td { padding:6px 10px; border:1px solid var(--border); }
    .inventaire-table tr:nth-child(even) { background:rgba(56,37,17,.02); }
    .sig-section { margin-top:36px; padding-top:28px; border-top:2px solid var(--border); }
    .sig-grid { display:grid; grid-template-columns:1fr 1fr; gap:32px; }
    .sig-box { display:flex; flex-direction:column; gap:8px; }
    .sig-label { font-size:12px; font-family:Inter,sans-serif; font-weight:600; color:var(--ink-2); text-transform:uppercase; letter-spacing:.05em; }
    .sig-name { font-size:13px; color:var(--ink-3); font-family:Inter,sans-serif; }
    canvas.sig-canvas { border:1.5px solid var(--border); border-radius:8px; background:#fff; cursor:crosshair; touch-action:none; display:block; width:100%; height:120px; }
    .sig-actions { display:flex; gap:8px; margin-top:4px; }
    .btn-sig-clear { font-size:11px; padding:4px 10px; border:1px solid var(--border); border-radius:6px; background:#fff; cursor:pointer; font-family:Inter,sans-serif; color:var(--ink-3); }
    .btn-sig-val { font-size:11px; padding:4px 14px; background:var(--accent); color:#fff; border:none; border-radius:6px; cursor:pointer; font-family:Inter,sans-serif; font-weight:600; }
    @media print { .toolbar { display:none !important; } .page-wrapper { padding:0; max-width:100%; } .contract-preview { border-radius:0; box-shadow:none; border:none; padding:20px; } body { background:white; } .sig-actions { display:none; } }
    @media (max-width:600px) { .contract-preview { padding:20px; } .sig-grid { grid-template-columns:1fr; } .toolbar { padding:10px 16px; } }
  </style>
</head>
<body>
<div class="toolbar">
  <div class="toolbar-left">
    <button class="btn-back" onclick="history.back()">← Retour</button>
    <div>
      <div class="toolbar-title" id="toolbar-title">Bail meublé</div>
      <div class="toolbar-sub" id="toolbar-sub">Chargement…</div>
    </div>
  </div>
  <button class="btn-print" onclick="window.print()">🖨️ Imprimer / PDF</button>
</div>

<div id="loading" style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;font-family:Inter,sans-serif;color:#8a7060">
  <div style="width:32px;height:32px;border:3px solid rgba(0,0,0,.1);border-top-color:#e8793a;border-radius:50%;animation:spin .8s linear infinite"></div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  <p>Chargement…</p>
</div>

<div id="page-wrapper" class="page-wrapper" style="display:none">
  <div class="contract-preview" id="print-area"></div>
</div>

<script>
  const SUPABASE_URL = 'https://nltuysmnxsomlhgvbtwz.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_UtH7OZskOMab-vCsoKKRsQ_rVkm5mRC';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function fmtDate(s) { if (!s) return '___________'; try { return new Intl.DateTimeFormat('fr-FR').format(new Date(s)); } catch(e) { return s; } }
  function fmtEur(v) { if (!v) return '—'; return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:2}).format(parseFloat(v)); }
  function v(val, fb) { return val || fb || '—'; }

  function buildInventaire(f) {
    var items = f.furnitureList || [];
    if (!items.length) {
      return '<p style="font-style:italic;color:var(--ink-3)">Inventaire à compléter lors de la remise des clés.</p>';
    }
    var rows = items.map(function(item) {
      return '<tr><td>' + (item.nom||'') + '</td><td>' + (item.quantite||'1') + '</td><td>' + (item.etat||'Bon') + '</td><td>' + (item.obs||'') + '</td></tr>';
    }).join('');
    return '<table class="inventaire-table"><thead><tr><th>Désignation</th><th>Qté</th><th>État</th><th>Observations</th></tr></thead><tbody>' + rows + '</tbody></table>';
  }

  function buildEDL(f, type) {
    var zones = [
      { nom: 'Entrée / Couloir', items: ['Sol (revêtement, état)', 'Murs et plafond', 'Porte d\'entrée (serrure, état)', 'Éclairage'] },
      { nom: 'Salon / Séjour', items: ['Sol', 'Murs et plafond', 'Fenêtres / volets', 'Éclairage', 'Prises et interrupteurs', 'Mobilier fourni'] },
      { nom: 'Chambre(s)', items: ['Sol', 'Murs et plafond', 'Fenêtres / volets', 'Éclairage', 'Mobilier fourni (lit, armoire...)'] },
      { nom: 'Cuisine', items: ['Sol', 'Murs et plafond', 'Équipements (plaques, four, frigo, hotte)', 'Placards et rangements', 'Éclairage'] },
      { nom: 'Salle de bain', items: ['Sol', 'Murs (carrelage, joints)', 'Baignoire / Douche', 'Lavabo (robinetterie)', 'WC (chasse, joints)', 'Ventilation'] },
      { nom: 'Installations générales', items: ['Tableau électrique', 'Compteur eau (relevé : ' + (f.waterMeter||'—') + ')', 'Compteur électricité (relevé : ' + (f.elecMeter||'—') + ')', 'Chauffage', 'Détecteur fumée'] }
    ];
    var optHtml = ['Bon','Moyen','Mauvais','N/A'].map(function(o){return '<option>'+o+'</option>';}).join('');
    var html = '<div style="margin-top:32px;padding-top:28px;border-top:2px solid var(--border)">';
    html += '<h4>Annexe 1 — État des lieux ' + (type==='entree'?'d\'entrée':'de sortie') + '</h4>';
    html += '<p style="font-size:.8rem;color:var(--ink-3);font-family:Inter,sans-serif;margin-bottom:16px">Logement : ' + (f.propertyAddress||'—') + ' — Date : ' + (type==='entree'?fmtDate(f.effectiveDate):new Intl.DateTimeFormat('fr-FR').format(new Date())) + '</p>';
    zones.forEach(function(zone) {
      html += '<div style="margin-bottom:14px;border:1px solid var(--border);border-radius:8px;overflow:hidden">';
      html += '<div style="background:rgba(56,37,17,.05);padding:7px 12px;font-family:Inter,sans-serif;font-size:.78rem;font-weight:700;text-transform:uppercase">' + zone.nom + '</div>';
      html += '<table style="width:100%;border-collapse:collapse;font-size:.8rem;font-family:Inter,sans-serif">';
      html += '<thead><tr style="background:rgba(56,37,17,.03)"><th style="padding:5px 10px;text-align:left;border-bottom:1px solid var(--border);width:45%">Élément</th><th style="padding:5px 10px;text-align:center;border-bottom:1px solid var(--border);width:18%">État</th><th style="padding:5px 10px;border-bottom:1px solid var(--border)">Observations</th></tr></thead><tbody>';
      zone.items.forEach(function(item,i) {
        html += '<tr style="' + (i%2?'background:rgba(56,37,17,.02)':'') + '"><td style="padding:5px 10px;border-bottom:1px solid var(--border)">' + item + '</td><td style="padding:5px 10px;border-bottom:1px solid var(--border);text-align:center"><select style="font-size:11px;padding:2px 4px;border:1px solid var(--border);border-radius:4px">' + optHtml + '</select></td><td style="padding:5px 10px;border-bottom:1px solid var(--border)"><input type="text" placeholder="RAS" style="width:100%;font-size:11px;padding:2px 6px;border:1px solid var(--border);border-radius:4px"/></td></tr>';
      });
      html += '</tbody></table></div>';
    });
    html += '<div style="margin-top:12px;padding:12px;background:rgba(56,37,17,.03);border-radius:8px;font-family:Inter,sans-serif;font-size:.8rem"><strong>Observations générales :</strong><br><textarea rows="3" placeholder="Observations sur l\'état général du logement..." style="width:100%;margin-top:6px;padding:7px;border:1px solid var(--border);border-radius:6px;font-size:.8rem;resize:vertical"></textarea></div>';
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:16px"><div><div style="font-family:Inter,sans-serif;font-size:.75rem;font-weight:700;text-transform:uppercase;margin-bottom:6px">Signature Bailleur</div><div style="height:56px;border:1px solid var(--border);border-radius:6px;background:white"></div><div style="font-size:.73rem;color:var(--ink-3);font-family:Inter,sans-serif;margin-top:4px">Lu et approuvé</div></div><div><div style="font-family:Inter,sans-serif;font-size:.75rem;font-weight:700;text-transform:uppercase;margin-bottom:6px">Signature Locataire</div><div style="height:56px;border:1px solid var(--border);border-radius:6px;background:white"></div><div style="font-size:.73rem;color:var(--ink-3);font-family:Inter,sans-serif;margin-top:4px">Lu et approuvé</div></div></div>';
    html += '</div>';
    return html;
  }

  function buildContrat(f) {
    var loyer = parseFloat(f.rent)||0;
    var charges = parseFloat(f.charges)||0;
    var loyerCC = loyer + charges;
    var isEtudiant = (f.leaseType||'').toLowerCase().includes('étudiant') || (f.leaseType||'').toLowerCase().includes('etudiant');
    var duree = isEtudiant ? '9 mois' : (f.duration || 'un (1) an renouvelable');
    var preavisLoc = '1 mois';
    var depot = parseFloat(f.deposit)||0;
    var hasGarant = f.guarantorName && f.guarantorName.trim();

    var html = '';

    // EN-TETE
    html += '<div class="contract-header">';
    html += '<p class="label">Bail de location meublée — Loi n° 89-462 du 6 juillet 1989 — Art. 25-3 à 25-11</p>';
    html += '<h3>BAIL MEUBLÉ</h3>';
    html += '<p class="subtitle">Conclu entre les soussignés — Signé à ' + v(f.signatureCity) + ', le ' + (f.signatureDate?fmtDate(f.signatureDate):'___________') + '</p>';
    html += '</div>';

    // ART 1 — PARTIES
    html += '<section><h4>Article 1 — Désignation des parties</h4>';
    html += '<p><strong>Le Bailleur :</strong> <strong>' + v(f.landlordName) + '</strong>';
    if (f.landlordRepresentative) html += ', représenté par ' + f.landlordRepresentative;
    html += ', domicilié au ' + v(f.landlordAddress) + (f.landlordEmail ? ', ' + f.landlordEmail : '') + ', ci-après désigné « le Bailleur ».</p>';
    html += '<p style="margin-top:8px"><strong>Le Locataire :</strong> <strong>' + v(f.tenantName) + '</strong>';
    if (f.tenantDOB) html += ', né(e) le ' + fmtDate(f.tenantDOB);
    if (f.tenantAddress) html += ', domicilié(e) au ' + f.tenantAddress;
    if (f.tenantPhone || f.tenantEmail) html += ', joignable au ' + v(f.tenantPhone) + ' / ' + v(f.tenantEmail);
    html += ', ci-après désigné « le Locataire ».</p>';
    if (hasGarant) {
      html += '<p style="margin-top:8px"><strong>La Caution solidaire :</strong> ' + v(f.guarantorName) + (f.guarantorAddress ? ', domiciliée au ' + f.guarantorAddress : '') + '.</p>';
    }
    html += '</section>';

    // ART 2 — LOGEMENT
    html += '<section><h4>Article 2 — Désignation du logement</h4>';
    html += '<p>Le Bailleur loue au Locataire le logement meublé suivant :</p>';
    html += '<p style="margin-top:8px"><strong>Adresse :</strong> ' + v(f.propertyAddress) + '</p>';
    if (f.propertyFloor) html += '<p><strong>Situation :</strong> ' + f.propertyFloor + '</p>';
    if (f.surface) html += '<p><strong>Surface habitable :</strong> ' + f.surface + '</p>';
    if (f.rooms) html += '<p><strong>Nombre de pièces :</strong> ' + f.rooms + '</p>';
    html += '<p><strong>Type de logement :</strong> ' + v(f.leaseType, 'Location meublée') + '</p>';
    html += '<p><strong>Chauffage :</strong> ' + v(f.heatingType, 'Individuel') + ' — <strong>Eau chaude :</strong> ' + v(f.hotWater, 'Individuelle') + '</p>';
    html += '<p style="margin-top:8px">Le logement est loué meublé conformément à la liste de mobilier annexée (Annexe 2 — Inventaire du mobilier), le Locataire reconnaissant avoir pris connaissance du mobilier mis à disposition.</p>';
    html += '</section>';

    // ART 3 — DUREE
    html += '<section><h4>Article 3 — Durée du bail</h4>';
    html += '<p>Le présent bail est consenti pour une durée de <strong>' + duree + '</strong>, à compter du <strong>' + fmtDate(f.effectiveDate) + '</strong>.</p>';
    if (isEtudiant) {
      html += '<p style="margin-top:6px">Il s\'agit d\'un bail étudiant de 9 mois non renouvelable par tacite reconduction, conformément à l\'article 25-7 de la loi du 6 juillet 1989.</p>';
    } else {
      html += '<p style="margin-top:6px">À l\'expiration, le bail se renouvelle tacitement pour la même durée, sauf congé donné par l\'une ou l\'autre des parties dans les délais prévus.</p>';
    }
    html += '<p style="margin-top:6px"><strong>Préavis du Locataire :</strong> ' + preavisLoc + ' (art. 25-8 — logement meublé).<br><strong>Préavis du Bailleur :</strong> 3 mois avant l\'échéance (motifs légaux requis).</p>';
    html += '</section>';

    // ART 4 — LOYER
    html += '<section><h4>Article 4 — Loyer</h4>';
    html += '<p>Le loyer mensuel hors charges est fixé à <strong>' + fmtEur(loyer) + '</strong>.</p>';
    if (charges > 0) {
      html += '<p style="margin-top:6px">Une provision sur charges de <strong>' + fmtEur(charges) + ' par mois</strong> s\'ajoute au loyer, soit un loyer charges comprises de <strong>' + fmtEur(loyerCC) + '</strong>.</p>';
    }
    html += '<p style="margin-top:6px">Le loyer est payable <strong>' + v(f.rentDueDay, 'le 1er de chaque mois') + '</strong> par <strong>' + v(f.paymentTerms, 'virement bancaire') + '</strong>.</p>';
    html += '<p style="margin-top:6px"><strong>Révision annuelle :</strong> Le loyer est révisé chaque année à la date anniversaire du bail, proportionnellement à la variation de l\'Indice de Référence des Loyers (IRL) publié par l\'INSEE (' + v(f.irlReference, 'IRL T4 2025 — indice 145,73') + ').</p>';
    html += '</section>';

    // ART 5 — DEPOT DE GARANTIE
    html += '<section><h4>Article 5 — Dépôt de garantie</h4>';
    if (depot > 0) {
      html += '<p>Le Bailleur reconnaît avoir reçu du Locataire la somme de <strong>' + fmtEur(depot) + '</strong> à titre de dépôt de garantie (équivalent à 2 mois de loyer hors charges maximum — art. 25-6 loi 89-462).</p>';
    } else {
      html += '<p>Un dépôt de garantie de 2 mois de loyer hors charges maximum est versé par le Locataire à la signature des présentes.</p>';
    }
    html += '<p style="margin-top:6px">Il sera restitué dans un délai maximum de <strong>1 mois</strong> (ou 2 mois si des dégradations sont constatées) après remise des clés et constatation de l\'état des lieux de sortie.</p>';
    html += '</section>';

    // ART 6 — CHARGES
    html += '<section><h4>Article 6 — Charges récupérables</h4>';
    html += '<p>Les charges récupérables font l\'objet d\'une provision mensuelle de ' + fmtEur(charges) + '. Une régularisation annuelle est effectuée sur présentation des justificatifs, conformément au décret n° 87-713 du 26 août 1987.</p>';
    html += '</section>';

    // ART 7 — OBLIGATIONS LOCATAIRE
    html += '<section><h4>Article 7 — Obligations du Locataire</h4>';
    html += '<ul>';
    html += '<li>Payer le loyer et les charges aux termes convenus</li>';
    html += '<li>Utiliser paisiblement le logement et le mobilier conformément à leur destination</li>';
    html += '<li>Maintenir le logement et le mobilier en bon état d\'entretien courant</li>';
    html += '<li>Souscrire et maintenir une assurance habitation (risques locatifs) et en justifier annuellement</li>';
    html += '<li>Ne pas sous-louer sans accord écrit du Bailleur</li>';
    html += '<li>Restituer le logement et le mobilier dans l\'état constaté à l\'entrée</li>';
    html += '<li>Respecter le règlement de copropriété et les règles de bon voisinage</li>';
    html += '</ul>';
    html += '</section>';

    // ART 8 — OBLIGATIONS BAILLEUR
    html += '<section><h4>Article 8 — Obligations du Bailleur</h4>';
    html += '<ul>';
    html += '<li>Délivrer un logement décent meublé conformément à la liste de l\'inventaire</li>';
    html += '<li>Assurer la jouissance paisible du logement</li>';
    html += '<li>Entretenir le logement en état de servir à l\'usage prévu (grosses réparations — art. 606 C. civ.)</li>';
    html += '<li>Remettre au Locataire toutes les pièces obligatoires (DPE, notice d\'information, état des risques)</li>';
    html += '</ul>';
    html += '</section>';

    // ART 9 — MOBILIER
    html += '<section><h4>Article 9 — Mobilier et équipements</h4>';
    html += '<p>Le logement est loué meublé. Les meubles et équipements fournis doivent comporter au minimum les éléments fixés par le décret n° 2015-981 du 31 juillet 2015 (literie, volets/rideaux, plaques de cuisson, four ou micro-ondes, réfrigérateur, vaisselle, ustensiles de cuisine, table, sièges, étagères de rangement, luminaires, matériel d\'entretien).</p>';
    html += '<p style="margin-top:6px">L\'inventaire détaillé du mobilier est joint en Annexe 2 au présent bail. Le Locataire est responsable du mobilier et des équipements durant toute la durée de la location.</p>';
    html += '</section>';

    // ART 10 — CLAUSE RESOLUTOIRE
    html += '<section><h4>Article 10 — Clause résolutoire</h4>';
    html += '<p>À défaut de paiement du loyer ou des charges à l\'échéance, un mois après un commandement de payer demeuré infructueux signifié par acte d\'huissier, ou en cas d\'inexécution par le Locataire d\'une obligation lui incombant, le présent bail sera résilié de plein droit, si bon semble au Bailleur.</p>';
    html += '</section>';

    // ART 11 — CLAUSES PARTICULIERES
    html += '<section><h4>Article 11 — Clauses particulières</h4>';
    if (f.specialClauses && f.specialClauses.trim()) {
      html += '<p>' + f.specialClauses.replace(/\n/g,'<br>') + '</p>';
    } else {
      html += '<p>Néant.</p>';
    }
    html += '</section>';

    // ART 12 — ELECTION DE DOMICILE
    html += '<section><h4>Article 12 — Élection de domicile</h4>';
    html += '<p>Pour l\'exécution des présentes, le Locataire fait élection de domicile dans le logement loué et le Bailleur à son adresse indiquée ci-dessus.</p>';
    html += '<p style="margin-top:6px">Fait à <strong>' + v(f.signatureCity) + '</strong>, le ' + (f.signatureDate?fmtDate(f.signatureDate):'___________') + ', en deux exemplaires originaux.</p>';
    html += '</section>';

    // MENTION LEGALE
    html += '<div class="mention-legale"><strong>Avertissement :</strong> Ce contrat est généré par Bailo à titre indicatif. Il s\'appuie sur la loi n° 89-462 du 6 juillet 1989 et ses décrets d\'application. Vérifiez sa conformité avec la réglementation en vigueur (encadrement des loyers si applicable) avant signature.</div>';

    // ANNEXES
    html += '<div style="margin-top:32px;padding-top:28px;border-top:2px solid var(--border)">';
    html += '<h4>Annexe 2 — Inventaire du mobilier</h4>';
    html += '<p style="font-size:.82rem;color:var(--ink-3);font-family:Inter,sans-serif;margin-bottom:12px">Logement : ' + v(f.propertyAddress) + ' — Date : ' + fmtDate(f.effectiveDate) + '</p>';
    html += buildInventaire(f);
    html += '<div style="margin-top:16px"><strong style="font-size:.82rem;font-family:Inter,sans-serif">Décret n° 2015-981 du 31 juillet 2015 :</strong><p style="font-size:.8rem;color:var(--ink-3);font-family:Inter,sans-serif;margin-top:4px">Le logement meublé doit comporter au minimum : literie avec couette/couverture, volets ou rideaux dans les chambres, plaques de cuisson, four ou micro-ondes, réfrigérateur avec freezer, vaisselle, ustensiles cuisine, table et chaises, rangements, luminaires, matériel d\'entretien ménager.</p></div>';
    html += '</div>';

    // EDL
    html += buildEDL(f, 'entree');

    // ART DPE + ERP
    html += '<div style="margin-top:32px;padding-top:28px;border-top:2px solid var(--border)">';
    html += '<h4>Annexe 3 — Diagnostics et informations légales</h4>';
    html += '<ul style="font-size:.85rem;font-family:Inter,sans-serif;padding-left:20px;line-height:2">';
    html += '<li>Diagnostic de Performance Énergétique (DPE) : Classe <strong>' + v(f.dpeClass,'—') + '</strong></li>';
    html += '<li>État des risques et pollutions (ERP) : ' + (f.riskZone ? 'Zone à risques — ERP de moins de 6 mois annexé' : 'Logement non situé dans une zone à risques naturels ou technologiques prévisibles') + '</li>';
    html += '<li>Notice d\'information relative aux droits et obligations des locataires et bailleurs : remise au Locataire</li>';
    if (f.leadDiag) html += '<li>Constat de risque d\'exposition au plomb (CREP) : annexé</li>';
    html += '</ul>';
    html += '</div>';

    return html;
  }

  async function saveBailleurSig() {
    var canvas = document.getElementById('sig-bailleur');
    if (!canvas) return;
    var blank = document.createElement('canvas'); blank.width=canvas.width; blank.height=canvas.height;
    if (canvas.toDataURL()===blank.toDataURL()) { alert('Signez d\'abord.'); return; }
    var sig = canvas.toDataURL('image/png');
    var leaseId = new URLSearchParams(window.location.search).get('lease');
    var resp = await db.from('leases').select('data').eq('id',leaseId).single();
    if (!resp.data) return;
    var ld=resp.data.data||{}; var fd=ld.formData||{};
    fd.sig_bailleur=sig; fd.sig_bailleur_at=new Date().toISOString(); ld.formData=fd;
    await db.from('leases').update({data:ld}).eq('id',leaseId);
    var box=canvas.closest('.sig-box');
    if (box) box.innerHTML='<span class="sig-label">Le Bailleur</span><div style="border:1px solid var(--border);border-radius:8px;overflow:hidden;background:white;padding:4px"><img src="'+sig+'" style="width:100%;max-height:120px;object-fit:contain;display:block"></div><div style="font-size:12px;color:#16a34a;font-weight:600;font-family:Inter,sans-serif;margin-top:4px">✓ Lu et approuvé — '+new Intl.DateTimeFormat('fr-FR').format(new Date())+'</div>';
    alert('Signature enregistrée.');
  }

  async function savePreneurSig() {
    var canvas = document.getElementById('sig-locataire');
    if (!canvas) return;
    var blank = document.createElement('canvas'); blank.width=canvas.width; blank.height=canvas.height;
    if (canvas.toDataURL()===blank.toDataURL()) { alert('Signez d\'abord.'); return; }
    var sig = canvas.toDataURL('image/png');
    var leaseId = new URLSearchParams(window.location.search).get('lease');
    var resp = await db.from('leases').select('data').eq('id',leaseId).single();
    if (!resp.data) return;
    var ld=resp.data.data||{}; var fd=ld.formData||{};
    fd.sig_locataire=sig; fd.sig_locataire_at=new Date().toISOString(); ld.formData=fd;
    await db.from('leases').update({data:ld}).eq('id',leaseId);
    var box=canvas.closest('.sig-box');
    if (box) box.innerHTML='<span class="sig-label">Le Locataire</span><div style="border:1px solid var(--border);border-radius:8px;overflow:hidden;background:white;padding:4px"><img src="'+sig+'" style="width:100%;max-height:120px;object-fit:contain;display:block"></div><div style="font-size:12px;color:#16a34a;font-weight:600;font-family:Inter,sans-serif;margin-top:4px">✓ Lu et approuvé — '+new Intl.DateTimeFormat('fr-FR').format(new Date())+'</div>';
    alert('Signature enregistrée.');
  }

  function initCanvas(id) {
    var canvas=document.getElementById(id); if (!canvas) return;
    var ctx=canvas.getContext('2d'); var drawing=false;
    canvas.width=canvas.offsetWidth*window.devicePixelRatio; canvas.height=120*window.devicePixelRatio;
    ctx.scale(window.devicePixelRatio,window.devicePixelRatio);
    function pos(e){var r=canvas.getBoundingClientRect();var src=e.touches?e.touches[0]:e;return{x:(src.clientX-r.left)*(canvas.offsetWidth/r.width),y:(src.clientY-r.top)*(120/r.height)};}
    canvas.addEventListener('mousedown',function(e){drawing=true;var p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);});
    canvas.addEventListener('mousemove',function(e){if(!drawing)return;var p=pos(e);ctx.lineTo(p.x,p.y);ctx.strokeStyle='#1a1208';ctx.lineWidth=2;ctx.lineCap='round';ctx.stroke();});
    canvas.addEventListener('mouseup',function(){drawing=false;});
    canvas.addEventListener('mouseleave',function(){drawing=false;});
    canvas.addEventListener('touchstart',function(e){e.preventDefault();drawing=true;var p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);},{passive:false});
    canvas.addEventListener('touchmove',function(e){e.preventDefault();if(!drawing)return;var p=pos(e);ctx.lineTo(p.x,p.y);ctx.strokeStyle='#1a1208';ctx.lineWidth=2;ctx.lineCap='round';ctx.stroke();},{passive:false});
    canvas.addEventListener('touchend',function(){drawing=false;});
  }

  function sigBlock(label, canvasId, existingSig, saveFn) {
    var dateStr=existingSig?new Intl.DateTimeFormat('fr-FR').format(new Date()):'';
    return '<div class="sig-box">'
      +'<span class="sig-label">'+label+'</span>'
      +(existingSig
        ?'<div style="border:1px solid var(--border);border-radius:8px;overflow:hidden;background:white;padding:4px"><img src="'+existingSig+'" style="width:100%;max-height:120px;object-fit:contain;display:block"></div><div style="font-size:12px;color:#16a34a;font-weight:600;font-family:Inter,sans-serif;margin-top:4px">✓ Lu et approuvé — '+dateStr+'</div>'
        :'<canvas class="sig-canvas" id="'+canvasId+'" width="400" height="120"></canvas>'
        +'<div class="sig-actions"><button class="btn-sig-clear" onclick="document.getElementById(\''+canvasId+'\').getContext(\'2d\').clearRect(0,0,9999,9999)">Effacer</button>'
        +(saveFn?'<button class="btn-sig-val" onclick="'+saveFn+'()">Valider ma signature</button>':'')
        +'</div><div style="font-size:12px;color:var(--ink-3);font-family:Inter,sans-serif;margin-top:4px">Lu et approuvé</div>')
      +'</div>';
  }

  async function init() {
    var params=new URLSearchParams(window.location.search);
    var leaseId=params.get('lease');
    if (!leaseId){document.getElementById('loading').innerHTML='<p style="color:#c0392b;font-family:Inter,sans-serif">Paramètre lease manquant.</p>';return;}
    var res=await db.from('leases').select('*').eq('id',leaseId).single();
    if (res.error||!res.data){document.getElementById('loading').innerHTML='<p style="color:#c0392b;font-family:Inter,sans-serif">Bail introuvable.</p>';return;}
    var f=(res.data.data&&res.data.data.formData)?res.data.data.formData:res.data.data||{};
    document.getElementById('toolbar-title').textContent='Bail meublé';
    document.getElementById('toolbar-sub').textContent=(f.tenantName||'—')+' — '+(f.propertyAddress||'—');
    document.title='Bail meublé — '+(f.tenantName||'')+' — Bailo';
    var html=buildContrat(f);
    // Signatures
    var lienPreneur=window.location.origin+'/contrat-meuble.html?lease='+leaseId+'&mode=preneur';
    html+='<div style="margin-top:32px;padding-top:28px;border-top:2px solid var(--border)">';
    if (params.get('mode')!=='preneur') {
      html+='<div style="background:#f0f7ff;border:1.5px solid #b0d0f0;border-radius:12px;padding:14px 18px;margin-bottom:20px;font-family:Inter,sans-serif">';
      html+='<div style="font-size:13px;font-weight:700;color:#1a3a6a;margin-bottom:8px">Envoyer au Locataire pour signature</div>';
      html+='<div style="display:flex;gap:8px;align-items:center"><input id="lien-preneur" value="'+lienPreneur+'" readonly style="flex:1;padding:7px 10px;border:1px solid #b0d0f0;border-radius:7px;font-size:11px;font-family:monospace;background:#fff">';
      html+='<button id="btn-copier" style="padding:7px 14px;background:#1a3a6a;color:white;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer">Copier</button></div></div>';
    }
    html+='<h4 style="font-size:.82rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--accent);margin-bottom:16px;font-family:Inter,sans-serif">Signatures</h4>';
    html+='<p style="font-size:13px;font-family:Inter,sans-serif;color:var(--ink-3);margin-bottom:16px">Fait à '+(f.signatureCity||'______')+', le '+new Intl.DateTimeFormat('fr-FR').format(new Date())+', en deux exemplaires.</p>';
    html+='<div class="sig-grid">';
    html+=sigBlock('Le Bailleur','sig-bailleur',f.sig_bailleur,'saveBailleurSig');
    html+=sigBlock('Le Locataire','sig-locataire',f.sig_locataire,'savePreneurSig');
    html+='</div></div>';
    html+='<p class="contract-footer" style="margin-top:24px;font-size:.74rem;color:var(--ink-3);font-family:Inter,sans-serif">Généré par Bailo — Bail meublé (loi 89-462 art. 25-3 et s.) — À titre indicatif.</p>';
    document.getElementById('print-area').innerHTML=html;
    document.getElementById('loading').style.display='none';
    document.getElementById('page-wrapper').style.display='';
    ['sig-bailleur','sig-locataire'].forEach(initCanvas);
    // Copier lien
    setTimeout(function(){
      var btn=document.getElementById('btn-copier');
      if (btn) btn.addEventListener('click',function(){
        var i=document.getElementById('lien-preneur');if(i){i.select();document.execCommand('copy');}
        btn.textContent='Copié !'; setTimeout(function(){btn.textContent='Copier';},2000);
      });
    },200);
  }

  init();
</script>
