<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>État des lieux — Bailo Gestion</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root {
  --green: #3ecf8e;
  --accent: #e8793a;
  --ink: #1a1208;
  --ink-2: #3a2a18;
  --ink-3: #6a5a40;
  --border: #d4c8b8;
  --bg: #f8f4ee;
  --bg-card: #fff;
  --r-md: 10px;
  --primary: #2563eb;
  --danger: #e53e3e;
  --success: #38a169;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }

/* Header */
.edl-header {
  background: #1a1208;
  color: white;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}
.edl-header h1 { font-size: 1rem; font-weight: 700; }
.edl-header-sub { font-size: .78rem; opacity: .65; }
.btn-back { background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.2); color: white; padding: 6px 12px; border-radius: 6px; font-size: .8rem; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
.btn-back:hover { background: rgba(255,255,255,.25); }

/* Layout */
.edl-container { max-width: 900px; margin: 0 auto; padding: 20px 16px; }

/* Sélecteur de bail */
.lease-selector { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r-md); padding: 16px 20px; margin-bottom: 20px; display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
.lease-selector select, .lease-selector input { padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; background: var(--bg); flex: 1; min-width: 200px; }
.lease-selector label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--ink-3); display: block; margin-bottom: 4px; }

/* Onglets entrée/sortie */
.edl-tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
.edl-tab { padding: 10px 20px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; background: none; color: var(--ink-3); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .15s; }
.edl-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

/* Pièces */
.room-card { background: var(--bg-card); border: 1.5px solid var(--border); border-radius: var(--r-md); padding: 16px; margin-bottom: 14px; }
.room-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.room-card-header h4 { font-size: 14px; font-weight: 700; }
.room-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.room-cell { padding: 8px 10px; }
.room-cell:nth-child(odd) { border-right: 1px solid var(--border); background: rgba(62,207,142,.04); }
.room-cell:nth-child(even) { background: rgba(232,121,58,.04); }
.room-cell + .room-cell { border-top: 1px solid var(--border); }
.room-cell:nth-child(odd) + .room-cell { border-top: 1px solid var(--border); }
.cell-label { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--ink-3); display: block; margin-bottom: 4px; }
.room-cell select, .room-cell textarea { width: 100%; padding: 6px 8px; border: 1.5px solid var(--border); border-radius: 6px; font-size: 12px; background: white; }
.room-cell textarea { resize: vertical; min-height: 56px; }

/* Conditions */
.chip { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: .74rem; font-weight: 600; }
.chip-excellent { background: #d1fae5; color: #065f46; }
.chip-good { background: #d1fae5; color: #065f46; }
.chip-fair { background: #fef3c7; color: #92400e; }
.chip-warning { background: #fed7aa; color: #9a3412; }
.chip-critical { background: #fee2e2; color: #991b1b; }

/* Photos */
.photo-section { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
.photo-col-label { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
.photo-col-label.entry { color: var(--green); }
.photo-col-label.exit { color: var(--accent); }
.camera-toolbar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.camera-shot { display: inline-flex; align-items: center; gap: 4px; padding: 5px 10px; background: #f0f0f0; border: 1px solid var(--border); border-radius: 6px; font-size: .75rem; cursor: pointer; font-weight: 600; color: var(--ink-2); }
.camera-shot:hover { background: #e0e0e0; }
.camera-shot input { display: none; }
.photo-list { display: flex; flex-wrap: wrap; gap: 8px; }
.photo-thumb { position: relative; width: 80px; }
.photo-thumb img { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; }
.photo-thumb span { display: block; font-size: .6rem; color: var(--ink-3); text-align: center; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.photo-remove { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,.6); color: white; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

/* Signature */
.sig-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r-md); padding: 20px; margin-top: 20px; }
.sig-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 16px; }
.sig-block { text-align: center; }
.sig-block label { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--ink-3); display: block; margin-bottom: 8px; }
.sig-canvas { width: 100%; height: 100px; border: 1.5px solid var(--border); border-radius: 8px; cursor: crosshair; background: white; touch-action: none; }
.sig-validated { background: rgba(62,207,142,.1); border: 1px solid var(--green); border-radius: 8px; padding: 10px; font-size: .84rem; color: #065f46; text-align: center; margin-top: 8px; }

/* Boutons */
.btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all .15s; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: #1d4ed8; }
.btn-secondary { background: white; color: var(--ink-2); border: 1.5px solid var(--border); }
.btn-secondary:hover { background: var(--bg); }
.btn-danger { background: white; color: var(--danger); border: 1.5px solid var(--danger); }
.btn-success { background: var(--green); color: white; }
.btn-sm { padding: 5px 10px; font-size: .78rem; }

/* Toolbar ajout pièce */
.room-add-bar { background: var(--bg-card); border: 1.5px dashed var(--border); border-radius: var(--r-md); padding: 14px 16px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
.room-type-btn { padding: 6px 12px; border: 1.5px solid var(--border); border-radius: 6px; background: white; font-size: .8rem; cursor: pointer; transition: all .15s; }
.room-type-btn:hover { background: var(--bg); border-color: var(--primary); color: var(--primary); }

/* Lightbox */
#edl-lightbox { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.9); z-index: 9999; align-items: center; justify-content: center; }
#edl-lightbox.open { display: flex; }
#edl-lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
#edl-lightbox button { position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,.2); border: none; color: white; font-size: 24px; cursor: pointer; border-radius: 50%; width: 40px; height: 40px; }

/* Toast */
#edl-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1a1208; color: white; padding: 10px 20px; border-radius: 8px; font-size: 13px; display: none; z-index: 9998; white-space: nowrap; }

.loading { padding: 40px; text-align: center; color: var(--ink-3); }
.diff-down { color: var(--danger); font-weight: 700; }
.diff-up { color: var(--green); font-weight: 700; }
</style>
</head>
<body>

<div class="edl-header">
  <div>
    <h1>📋 État des lieux</h1>
    <div class="edl-header-sub" id="edl-header-sub">Sélectionnez un bail pour commencer</div>
  </div>
  <a href="/" class="btn-back">← Retour</a>
</div>

<div class="edl-container">

  <!-- Sélecteur bail -->
  <div class="lease-selector">
    <div style="flex:2;min-width:250px">
      <label>Bail / Locataire</label>
      <select id="edl-lease-select" onchange="loadEDL()">
        <option value="">-- Choisir un bail --</option>
      </select>
    </div>
    <div>
      <label>Type d'EDL</label>
      <select id="edl-type-select" onchange="loadEDL()">
        <option value="entry">Entrée</option>
        <option value="exit">Sortie</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="saveEDL()">💾 Enregistrer</button>
    <button class="btn btn-secondary" onclick="validateEDL()">✅ Valider et signer</button>
    <label class="btn btn-secondary" style="cursor:pointer" title="Importer un EDL depuis le fichier export Bailo v1">
      ⬆ Import v1
      <input type="file" accept=".json" style="display:none" onchange="importFromV1(this)">
    </label>
  </div>

  <!-- Pièces -->
  <div id="edl-rooms-container">
    <div class="loading">Choisissez un bail pour afficher l'état des lieux.</div>
  </div>

</div>

<!-- Lightbox photo -->
<div id="edl-lightbox" onclick="closeLightbox()">
  <img id="edl-lightbox-img" src="" alt="">
  <button onclick="closeLightbox()">✕</button>
</div>

<!-- Modal signature -->
<div id="sig-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:9000;align-items:center;justify-content:center">
  <div style="background:white;border-radius:12px;padding:24px;max-width:500px;width:90%;max-height:90vh;overflow-y:auto">
    <h3 style="margin-bottom:16px;font-size:15px">✍️ Signature de l'état des lieux</h3>
    <div class="sig-grid">
      <div class="sig-block">
        <label>Signature bailleur</label>
        <canvas id="sig-canvas-bailleur" class="sig-canvas" width="220" height="100"></canvas>
        <div style="display:flex;gap:6px;margin-top:6px;justify-content:center">
          <button class="btn btn-secondary btn-sm" onclick="clearSig('bailleur')">Effacer</button>
        </div>
        <div id="sig-bailleur-ok" class="sig-validated" style="display:none">✓ Bailleur signé</div>
      </div>
      <div class="sig-block">
        <label>Signature locataire</label>
        <canvas id="sig-canvas-locataire" class="sig-canvas" width="220" height="100"></canvas>
        <div style="display:flex;gap:6px;margin-top:6px;justify-content:center">
          <button class="btn btn-secondary btn-sm" onclick="clearSig('locataire')">Effacer</button>
        </div>
        <div id="sig-locataire-ok" class="sig-validated" style="display:none">✓ Locataire signé</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:20px;justify-content:flex-end">
      <button class="btn btn-secondary" onclick="closeSigModal()">Annuler</button>
      <button class="btn btn-success" onclick="submitSignatures()">✅ Valider les signatures</button>
    </div>
  </div>
</div>

<div id="edl-toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL = 'https://nltuysmnxsomlhgvbtwz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5sdHV5c21ueHNvbWxoZ3ZidHd6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDAyOTUsImV4cCI6MjA5MjI3NjI5NX0.ekmk4ujs0H1UfuDopnd_RNop1obgZgRM3ilj0yzqgM0';
const EDL_BUCKET = 'documents';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ============================================================
// STATE
// ============================================================
let _currentLeaseId = null;
let _currentLease = null;
let _edlType = 'entry'; // 'entry' | 'exit'
let _rooms = [];
let _edlData = null; // données sauvegardées dans Supabase

const ROOM_TYPES = ['Entrée', 'Séjour', 'Cuisine', 'Chambre', 'Salle de bain', 'WC', 'Bureau', 'Cave', 'Garage', 'Autre'];
const CONDITIONS = ["Très bon état", "Bon état", "État d'usage", "À surveiller", "Défaillant"];

function roomTemplate(name) {
  return {
    id: 'r_' + Date.now() + '_' + Math.random().toString(36).slice(2),
    name: name || 'Pièce',
    equipment: '',
    floor: '', walls: '', ceiling: '', windows: '',
    observations: '',
    floorOut: '', wallsOut: '', ceilingOut: '', windowsOut: '',
    observationsOut: '',
    photos: [],
    photosOut: []
  };
}

function getConditionTone(v) {
  return { "Très bon état":"excellent","Bon état":"good","État d'usage":"fair","À surveiller":"warning","Défaillant":"critical" }[v] || "neutral";
}

function createConditionOptions(sel) {
  return '<option value="">--</option>' + CONDITIONS.map(o =>
    '<option value="' + o + '"' + (o === sel ? ' selected' : '') + '>' + o + '</option>'
  ).join('');
}

function diffIcon(entry, exit) {
  if (!exit) return '';
  const w = {"Très bon état":0,"Bon état":1,"État d'usage":2,"À surveiller":3,"Défaillant":4};
  const eW = w[entry] ?? 2, xW = w[exit] ?? 2;
  if (xW > eW) return ' <span class="diff-down" title="Dégradé">▼</span>';
  if (xW < eW) return ' <span class="diff-up" title="Amélioré">▲</span>';
  return ' <span style="color:#999" title="Identique">=</span>';
}

// ============================================================
// INIT
// ============================================================
async function init() {
  // Charger les baux
  const { data: leases } = await db.from('leases').select('id, data');
  const sel = document.getElementById('edl-lease-select');
  if (leases && leases.length) {
    leases.forEach(l => {
      const f = l.data?.formData || {};
      if (f.tenantName) {
        const opt = document.createElement('option');
        opt.value = l.id;
        opt.textContent = f.tenantName + ' — ' + (f.propertyAddress || '');
        sel.appendChild(opt);
      }
    });
    _allLeases = leases;
  }

  // Lire paramètre URL si présent
  const params = new URLSearchParams(window.location.search);
  if (params.get('lease')) {
    sel.value = params.get('lease');
    if (params.get('type')) document.getElementById('edl-type-select').value = params.get('type');
    loadEDL();
  }
}

let _allLeases = [];

async function loadEDL() {
  const leaseId = document.getElementById('edl-lease-select').value;
  _edlType = document.getElementById('edl-type-select').value;
  if (!leaseId) return;

  _currentLeaseId = leaseId;
  _currentLease = _allLeases.find(l => l.id === leaseId);
  const f = _currentLease?.data?.formData || {};
  document.getElementById('edl-header-sub').textContent =
    (f.tenantName || '') + ' — ' + (f.propertyAddress || '') + ' — EDL ' + (_edlType === 'entry' ? 'Entrée' : 'Sortie');

  // Charger EDL depuis Supabase (stocké dans data.edl)
  const { data: lease } = await db.from('leases').select('data').eq('id', leaseId).single();
  _edlData = lease?.data || {};
  const edlKey = _edlType === 'entry' ? 'edlEntry' : 'edlExit';
  _rooms = (_edlData[edlKey]?.rooms || []).map(r => ({
    ...roomTemplate(r.name),
    ...r,
    photos: r.photos || [],
    photosOut: r.photosOut || []
  }));

  // Si entrée et pas de pièces, proposer les pièces par défaut
  if (_edlType === 'entry' && _rooms.length === 0) {
    _rooms = ['Entrée', 'Séjour', 'Cuisine', 'Chambre 1', 'Salle de bain', 'WC'].map(roomTemplate);
  }

  renderEDL();
}

// ============================================================
// RENDU
// ============================================================
function renderEDL() {
  const container = document.getElementById('edl-rooms-container');
  const isExit = _edlType === 'exit';

  container.innerHTML = `
    <div class="room-add-bar">
      <span style="font-size:12px;font-weight:700;color:var(--ink-3)">Ajouter une pièce :</span>
      ${ROOM_TYPES.map(t => `<button class="room-type-btn" onclick="addRoom('${t}')">${t}</button>`).join('')}
    </div>
    ${_rooms.map((r, i) => renderRoom(r, i, isExit)).join('')}
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn btn-primary" onclick="saveEDL()">💾 Enregistrer l'EDL</button>
      <button class="btn btn-success" onclick="validateEDL()">✅ Valider et signer</button>
    </div>
  `;

  // Attacher les event listeners sur les selects et textareas
  container.querySelectorAll('[data-room-id][data-field]').forEach(el => {
    el.addEventListener('change', function() {
      updateRoomField(this.dataset.roomId, this.dataset.field, this.value);
    });
    el.addEventListener('input', function() {
      updateRoomField(this.dataset.roomId, this.dataset.field, this.value);
    });
  });

  // Listeners upload photos
  container.querySelectorAll('[data-upload-entry]').forEach(el => {
    el.addEventListener('change', function() { handlePhotoUpload(this.files, this.dataset.uploadEntry, 'entry'); });
  });
  container.querySelectorAll('[data-upload-exit]').forEach(el => {
    el.addEventListener('change', function() { handlePhotoUpload(this.files, this.dataset.uploadExit, 'exit'); });
  });
}

function renderRoom(room, idx, isExit) {
  const fields = [
    ['Sol', 'floor', 'floorOut'],
    ['Murs', 'walls', 'wallsOut'],
    ['Plafond', 'ceiling', 'ceilingOut'],
    ['Ouvertures', 'windows', 'windowsOut'],
  ];

  const grid = fields.map(([label, entryF, exitF]) => `
    <div class="room-cell">
      <span class="cell-label">${label} — entrée</span>
      <select data-room-id="${room.id}" data-field="${entryF}">${createConditionOptions(room[entryF])}</select>
    </div>
    <div class="room-cell">
      <span class="cell-label">${label} — sortie ${room[exitF] ? diffIcon(room[entryF], room[exitF]) : ''}</span>
      <select data-room-id="${room.id}" data-field="${exitF}">${createConditionOptions(room[exitF])}</select>
    </div>
  `).join('');

  const photosEntry = (room.photos || []).filter(p => p && p.url && p.url.startsWith('http')).map((p, pi) => `
    <figure class="photo-thumb">
      <img src="${p.url}" alt="${p.name || 'Photo'}" onclick="openLightbox('${p.url}', '${p.name || ''}')">
      <span>${p.name || 'Entrée ' + (pi+1)}</span>
      <button class="photo-remove" onclick="removePhoto('${room.id}', ${pi}, 'entry')">✕</button>
    </figure>`).join('') || '<p style="font-size:.75rem;color:var(--ink-3)">Aucune photo</p>';

  const photosExit = (room.photosOut || []).filter(p => p && p.url && p.url.startsWith('http')).map((p, pi) => `
    <figure class="photo-thumb">
      <img src="${p.url}" alt="${p.name || 'Photo'}" onclick="openLightbox('${p.url}', '${p.name || ''}')">
      <span>${p.name || 'Sortie ' + (pi+1)}</span>
      <button class="photo-remove" onclick="removePhoto('${room.id}', ${pi}, 'exit')">✕</button>
    </figure>`).join('') || '<p style="font-size:.75rem;color:var(--ink-3)">Aucune photo</p>';

  return `
    <div class="room-card" id="room-${room.id}">
      <div class="room-card-header">
        <h4>Pièce ${idx + 1} — ${escHtml(room.name)}</h4>
        <div style="display:flex;gap:6px">
          <input value="${escHtml(room.name)}" data-room-id="${room.id}" data-field="name"
            style="padding:4px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:12px;width:140px">
          <button class="btn btn-danger btn-sm" onclick="removeRoom('${room.id}')">Supprimer</button>
        </div>
      </div>

      <div style="margin-bottom:8px">
        <span class="cell-label">Équipements</span>
        <input value="${escHtml(room.equipment)}" data-room-id="${room.id}" data-field="equipment"
          placeholder="Radiateur, placard, volets..." style="width:100%;padding:6px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:12px">
      </div>

      <div class="room-grid">${grid}</div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
        <div>
          <span class="cell-label">Observations entrée</span>
          <textarea data-room-id="${room.id}" data-field="observations" rows="3"
            placeholder="Défauts constatés à l'entrée…" style="width:100%;padding:6px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:12px;resize:vertical">${escHtml(room.observations)}</textarea>
        </div>
        <div>
          <span class="cell-label">Observations sortie</span>
          <textarea data-room-id="${room.id}" data-field="observationsOut" rows="3"
            placeholder="Dégradations constatées à la sortie…" style="width:100%;padding:6px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:12px;resize:vertical">${escHtml(room.observationsOut)}</textarea>
        </div>
      </div>

      <div class="photo-section">
        <div>
          <p class="photo-col-label entry">📸 Photos d'entrée</p>
          <div class="camera-toolbar">
            <label class="camera-shot">📁 Importer<input type="file" accept="image/*" multiple data-upload-entry="${room.id}"></label>
            <label class="camera-shot">📱 Capturer<input type="file" accept="image/*" capture="environment" data-upload-entry="${room.id}"></label>
          </div>
          <div class="photo-list">${photosEntry}</div>
        </div>
        <div>
          <p class="photo-col-label exit">📸 Photos de sortie</p>
          <div class="camera-toolbar">
            <label class="camera-shot">📁 Importer<input type="file" accept="image/*" multiple data-upload-exit="${room.id}"></label>
            <label class="camera-shot">📱 Capturer<input type="file" accept="image/*" capture="environment" data-upload-exit="${room.id}"></label>
          </div>
          <div class="photo-list">${photosExit}</div>
        </div>
      </div>
    </div>
  `;
}

function escHtml(s) {
  return (s || '').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
// ACTIONS
// ============================================================
function addRoom(type) {
  _rooms.push(roomTemplate(type));
  renderEDL();
}

function removeRoom(roomId) {
  if (!confirm('Supprimer cette pièce ?')) return;
  _rooms = _rooms.filter(r => r.id !== roomId);
  renderEDL();
}

function updateRoomField(roomId, field, value) {
  _rooms = _rooms.map(r => r.id === roomId ? {...r, [field]: value} : r);
}

async function handlePhotoUpload(files, roomId, side) {
  if (!files || !files.length || !_currentLeaseId) return;
  showToast('Upload en cours...');
  for (const file of Array.from(files)) {
    const photo = await uploadPhoto(file, roomId, side);
    if (photo) {
      _rooms = _rooms.map(r => {
        if (r.id !== roomId) return r;
        if (side === 'entry') return {...r, photos: [...r.photos, photo]};
        return {...r, photosOut: [...(r.photosOut || []), photo]};
      });
    }
  }
  await saveEDL(); // Sauvegarder dans Supabase
  renderEDL();     // Re-render avec les nouvelles photos
  showToast('Photos ajoutées et enregistrées ✅');
}

async function uploadPhoto(file, roomId, suffix) {
  try {
    const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
    const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
    const path = (_currentLeaseId || 'draft') + '/' + roomId + '/' + suffix + '_' + Date.now() + '_' + safeName;
    console.log('[EDL] Uploading to:', EDL_BUCKET, path);
    const { data: upData, error } = await db.storage.from(EDL_BUCKET).upload(path, file, {upsert: true, cacheControl: '3600'});
    if (error) {
      console.error('[EDL] Upload error:', error);
      showToast('Erreur upload: ' + error.message);
      return null;
    }
    const { data: urlData } = db.storage.from(EDL_BUCKET).getPublicUrl(path);
    console.log('[EDL] Upload OK, url:', urlData.publicUrl);
    return {name: file.name, url: urlData.publicUrl};
  } catch(e) {
    console.error('[EDL] Upload exception:', e);
    showToast('Erreur upload: ' + e.message);
    return null;
  }
}

async function removePhoto(roomId, idx, side) {
  _rooms = _rooms.map(r => {
    if (r.id !== roomId) return r;
    if (side === 'entry') return {...r, photos: r.photos.filter((_,i) => i !== idx)};
    return {...r, photosOut: (r.photosOut||[]).filter((_,i) => i !== idx)};
  });
  renderEDL();
  await saveEDL();
  showToast('Photo supprimée ✅');
}

async function saveEDL() {
  if (!_currentLeaseId) { showToast('Choisissez un bail.'); return; }
  const edlKey = _edlType === 'entry' ? 'edlEntry' : 'edlExit';
  const payload = {
    ..._edlData,
    [edlKey]: {
      rooms: _rooms,
      savedAt: new Date().toISOString(),
      type: _edlType
    }
  };
  const { error } = await db.from('leases').update({data: payload}).eq('id', _currentLeaseId);
  if (error) { showToast('Erreur: ' + error.message); return; }
  _edlData = payload;
  showToast('EDL enregistré ✅');
}

function validateEDL() {
  if (!_currentLeaseId) { showToast('Choisissez un bail.'); return; }
  // Ouvrir le modal de signature
  document.getElementById('sig-modal').style.display = 'flex';
  initSigCanvas('bailleur');
  initSigCanvas('locataire');
  // Pré-charger signatures existantes
  const sigs = _edlData?.edlSign || {};
  if (sigs.bailleur) {
    const img = new Image();
    img.onload = () => {
      const ctx = document.getElementById('sig-canvas-bailleur').getContext('2d');
      ctx.drawImage(img, 0, 0);
      document.getElementById('sig-bailleur-ok').style.display = '';
    };
    img.src = sigs.bailleur;
  }
  if (sigs.locataire) {
    const img = new Image();
    img.onload = () => {
      const ctx = document.getElementById('sig-canvas-locataire').getContext('2d');
      ctx.drawImage(img, 0, 0);
      document.getElementById('sig-locataire-ok').style.display = '';
    };
    img.src = sigs.locataire;
  }
}

function initSigCanvas(role) {
  const canvas = document.getElementById('sig-canvas-' + role);
  if (!canvas || canvas._inited) return;
  canvas._inited = true;
  const ctx = canvas.getContext('2d');
  let drawing = false;
  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const sx = canvas.width / rect.width, sy = canvas.height / rect.height;
    const src = e.touches ? e.touches[0] : e;
    return {x: (src.clientX - rect.left) * sx, y: (src.clientY - rect.top) * sy};
  }
  canvas.addEventListener('mousedown', e => { drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
  canvas.addEventListener('mousemove', e => { if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.strokeStyle = '#1a1208'; ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.stroke(); });
  canvas.addEventListener('mouseup', () => drawing = false);
  canvas.addEventListener('mouseleave', () => drawing = false);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }, {passive: false});
  canvas.addEventListener('touchmove', e => { e.preventDefault(); if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.strokeStyle = '#1a1208'; ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.stroke(); }, {passive: false});
  canvas.addEventListener('touchend', () => drawing = false);
}

function clearSig(role) {
  const canvas = document.getElementById('sig-canvas-' + role);
  if (canvas) { canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height); canvas._inited = false; initSigCanvas(role); }
  document.getElementById('sig-' + role + '-ok').style.display = 'none';
}

function closeSigModal() {
  document.getElementById('sig-modal').style.display = 'none';
}

async function submitSignatures() {
  const cb = document.getElementById('sig-canvas-bailleur');
  const cl = document.getElementById('sig-canvas-locataire');
  const blank = document.createElement('canvas');
  blank.width = cb.width; blank.height = cb.height;

  const sigB = cb.toDataURL() !== blank.toDataURL() ? cb.toDataURL() : null;
  const sigL = cl.toDataURL() !== blank.toDataURL() ? cl.toDataURL() : null;

  const edlKey = _edlType === 'entry' ? 'edlEntry' : 'edlExit';
  const payload = {
    ..._edlData,
    edlSign: {
      ..._edlData?.edlSign,
      bailleur: sigB || _edlData?.edlSign?.bailleur,
      locataire: sigL || _edlData?.edlSign?.locataire,
      validatedAt: new Date().toISOString()
    },
    [edlKey]: {
      ..._edlData?.[edlKey],
      rooms: _rooms,
      validated: true,
      validatedAt: new Date().toISOString()
    }
  };

  const { error } = await db.from('leases').update({data: payload}).eq('id', _currentLeaseId);
  if (error) { showToast('Erreur: ' + error.message); return; }

  _edlData = payload;
  if (sigB) document.getElementById('sig-bailleur-ok').style.display = '';
  if (sigL) document.getElementById('sig-locataire-ok').style.display = '';
  showToast('EDL validé et signé ✅');
  closeSigModal();
}

// ============================================================
// UTILITAIRES
// ============================================================
function openLightbox(url, alt) {
  const lb = document.getElementById('edl-lightbox');
  document.getElementById('edl-lightbox-img').src = url;
  document.getElementById('edl-lightbox-img').alt = alt;
  lb.classList.add('open');
}

function closeLightbox() {
  document.getElementById('edl-lightbox').classList.remove('open');
}

function showToast(msg) {
  const t = document.getElementById('edl-toast');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.display = 'none', 3000);
}

// ============================================================
// IMPORT DEPUIS V1
// ============================================================
async function importFromV1(input) {
  const file = input.files[0];
  if (!file) return;
  showToast('Lecture du fichier...');

  try {
    const text = await file.text();
    const backup = JSON.parse(text);

    // Les EDL sont dans localStorage.library (leasesLibrary)
    const library = backup.localStorage?.library || [];
    if (!library.length) {
      showToast('Aucun EDL trouvé dans ce fichier.');
      return;
    }

    // Charger les baux Supabase pour faire le lien par ID
    const { data: supaLeases } = await db.from('leases').select('id, data');
    let imported = 0;

    for (const localLease of library) {
      if (!localLease.rooms || !localLease.rooms.length) continue;

      // Trouver le bail correspondant dans Supabase par ID
      const supaLease = supaLeases?.find(l => l.id === localLease.id);
      if (!supaLease) continue;

      // Construire les pièces pour edlEntry
      const rooms = localLease.rooms.map(r => ({
        id: r.id || ('r_' + Date.now() + '_' + Math.random().toString(36).slice(2)),
        name: r.name || 'Pièce',
        equipment: r.equipment || '',
        floor: r.floor || '', walls: r.walls || '',
        ceiling: r.ceiling || '', windows: r.windows || '',
        observations: r.observations || '',
        floorOut: r.floorOut || '', wallsOut: r.wallsOut || '',
        ceilingOut: r.ceilingOut || '', windowsOut: r.windowsOut || '',
        observationsOut: r.observationsOut || '',
        photos: r.photos || [],
        photosOut: r.photosOut || []
      }));

      // Sauvegarder dans leases.data.edlEntry
      const currentData = supaLease.data || {};
      const newData = {
        ...currentData,
        edlEntry: {
          rooms: rooms,
          savedAt: localLease.updatedAt || new Date().toISOString(),
          importedFromV1: true
        }
      };

      await db.from('leases').update({ data: newData }).eq('id', localLease.id);
      imported++;
    }

    showToast(imported + ' EDL importé(s) depuis v1 ✅');
    // Recharger si un bail est sélectionné
    if (_currentLeaseId) loadEDL();

  } catch(e) {
    showToast('Erreur import: ' + e.message);
    console.error(e);
  }
  input.value = '';
}

// Boot
document.addEventListener('DOMContentLoaded', init);
