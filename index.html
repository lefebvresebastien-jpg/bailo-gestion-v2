<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bailo Gestion</title>
  <meta name="description" content="Bailo Gestion — Gérez vos biens immobiliers">
  <meta name="theme-color" content="#1a1208">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bailo Gestion">
  <link rel="manifest" href="manifest-bailleur.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%231a1208' rx='20'/><text y='.9em' font-size='62' x='10'>🏡</text></svg>">
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   DETAIL BAIL
   ============================================================ */
.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-lg);
}

.detail-fields {
  padding: var(--space-md) var(--space-lg);
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.detail-field {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--color-border-light);
}
.detail-field:last-child { border-bottom: none; padding-bottom: 0; }
.detail-field-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--color-text-tertiary);
}
.detail-field-value {
  font-size: 13.5px;
  font-weight: 500;
  color: var(--color-text);
}
.detail-field-value.amount {
  font-size: 18px;
  font-weight: 700;
  color: var(--color-primary);
}

@media (max-width: 768px) {
  .detail-grid { grid-template-columns: 1fr; }
}

/* Quittances */
.receipts-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: var(--space-md);
  margin-bottom: var(--space-lg);
}
.receipt-stat-card {
  background: var(--color-surface);
  border-radius: var(--radius-lg);
  border: 1px solid var(--color-border);
  padding: var(--space-md) var(--space-lg);
  display: flex; flex-direction: column; gap: 2px;
}
.receipt-stat-val { font-size: 22px; font-weight: 700; }
.receipt-stat-label { font-size: 11px; color: var(--color-text-secondary); }


/* ============================================================
   MESSAGERIE
   ============================================================ */
.messages-layout {
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 0;
  height: calc(100vh - 120px);
  background: var(--color-surface);
  border-radius: var(--radius-lg);
  border: 1px solid var(--color-border);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}

.messages-sidebar {
  border-right: 1px solid var(--color-border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.messages-search-bar {
  padding: var(--space-md);
  border-bottom: 1px solid var(--color-border-light);
}
.messages-search-bar input {
  width: 100%;
  padding: 8px 12px;
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-md);
  background: var(--color-bg);
  outline: none;
  font-size: 13px;
}
.messages-search-bar input:focus { border-color: var(--color-primary); }

.messages-kind-filters {
  display: flex;
  gap: 4px;
  padding: 8px var(--space-md);
  border-bottom: 1px solid var(--color-border-light);
  flex-wrap: wrap;
}
.kind-filter {
  font-size: 11px;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: 99px;
  color: var(--color-text-secondary);
  border: 1.5px solid var(--color-border);
  background: transparent;
  transition: all 0.15s;
  cursor: pointer;
}
.kind-filter:hover { border-color: var(--color-primary); color: var(--color-primary); }
.kind-filter.active { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }

.messages-conv-list {
  flex: 1;
  overflow-y: auto;
}

.conv-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 12px var(--space-md);
  border-bottom: 1px solid var(--color-border-light);
  cursor: pointer;
  transition: background 0.1s;
}
.conv-item:hover { background: var(--color-bg); }
.conv-item.active { background: var(--color-primary-light); }

.conv-icon {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  background: var(--color-bg);
}
.conv-icon.kind-Renseignement { background: var(--color-primary-light); }
.conv-icon.kind-Incident { background: var(--color-warning-light); }
.conv-icon.kind-Document { background: var(--color-success-light); }
.conv-icon.kind-Quittance { background: var(--color-purple-light); }

.conv-body { flex: 1; min-width: 0; }
.conv-tenant { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tenants-table { width: 100%; }
.tenant-row-header { display: grid; grid-template-columns: 2fr 2fr 2fr 1fr 1.5fr; gap: 12px; padding: 10px 16px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--color-text-secondary); border-bottom: 1px solid var(--color-border); }
.tenant-row { display: grid; grid-template-columns: 2fr 2fr 2fr 1fr 1.5fr; gap: 12px; padding: 14px 16px; align-items: center; border-bottom: 1px solid var(--color-border); font-size: 13px; }
.tenant-row:hover { background: var(--color-surface); }
.tenant-name { font-size: 14px; font-weight: 600; }
.tenant-email { color: var(--color-text-secondary); font-size: 12px; }
.tenant-lease { color: var(--color-text-secondary); font-size: 12px; }
.conv-subject { font-size: 12px; color: var(--color-text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.conv-meta { text-align: right; flex-shrink: 0; }
.conv-date { font-size: 11px; color: var(--color-text-tertiary); }
.conv-kind-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 99px;
  display: inline-block;
  margin-top: 3px;
}
.conv-kind-badge.kind-Incident { background: var(--color-warning-light); color: var(--color-warning); }
.conv-kind-badge.kind-Renseignement { background: var(--color-primary-light); color: var(--color-primary); }
.conv-kind-badge.kind-Document { background: var(--color-success-light); color: var(--color-success); }
.conv-kind-badge.kind-Quittance { background: var(--color-purple-light); color: var(--color-purple); }

/* Détail message */
.messages-detail {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.messages-empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--color-text-tertiary);
  gap: var(--space-md);
}
.messages-empty-state span { font-size: 48px; }
.messages-empty-state p { font-size: 14px; }

.msg-detail-header {
  padding: var(--space-lg);
  border-bottom: 1px solid var(--color-border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--space-md);
}
.msg-detail-title { font-size: 16px; font-weight: 700; }
.msg-detail-sub { font-size: 12px; color: var(--color-text-secondary); margin-top: 3px; }

.msg-detail-body {
  flex: 1;
  padding: var(--space-lg);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: var(--space-md);
}

.msg-bubble {
  max-width: 80%;
  padding: 12px 16px;
  border-radius: var(--radius-lg);
  font-size: 13.5px;
  line-height: 1.5;
}
.msg-bubble.bailleur {
  background: var(--color-primary);
  color: #fff;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.msg-bubble.locataire {
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}
.msg-bubble-meta {
  font-size: 11px;
  opacity: 0.7;
  margin-top: 4px;
}

.msg-detail-footer {
  padding: var(--space-md) var(--space-lg);
  border-top: 1px solid var(--color-border);
  display: flex;
  gap: var(--space-md);
  align-items: flex-end;
}
.msg-detail-footer textarea {
  flex: 1;
  padding: 10px 12px;
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-md);
  resize: none;
  font-size: 13px;
  outline: none;
  min-height: 44px;
  max-height: 120px;
  transition: border-color 0.15s;
}
.msg-detail-footer textarea:focus { border-color: var(--color-primary); }

@media (max-width: 768px) {
  .messages-layout { grid-template-columns: 1fr; height: auto; }
  .messages-detail { display: none; }
  .messages-detail.open { display: flex; height: 70vh; }
  .messages-sidebar { height: 50vh; }
}


/* Upload fichier */
.file-upload-zone {
  border: 2px dashed var(--color-border);
  border-radius: var(--radius-md);
  padding: var(--space-lg);
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  background: var(--color-bg);
}
.file-upload-zone:hover { border-color: var(--color-primary); background: var(--color-primary-light); }
.file-upload-zone.has-file { border-color: var(--color-success); background: var(--color-success-light); }

.msg-attachment {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  font-size: 13px;
  text-decoration: none;
  color: var(--color-text);
  transition: background 0.15s;
  margin-top: 8px;
}
.msg-attachment:hover { background: var(--color-primary-light); color: var(--color-primary); }


/* ============================================================
   PROPERTIES & UNITS
   ============================================================ */
.property-card-v2 {
  background: var(--color-surface);
  border-radius: var(--radius-lg);
  border: 1px solid var(--color-border);
  box-shadow: var(--shadow-sm);
  padding: var(--space-lg);
  cursor: pointer;
  transition: box-shadow 0.15s, transform 0.1s;
}
.property-card-v2:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }

.property-card-header {
  display: flex; align-items: flex-start;
  justify-content: space-between; margin-bottom: 12px;
}
.property-type-badge {
  font-size: 10px; font-weight: 700; padding: 3px 8px;
  border-radius: 99px; text-transform: uppercase; letter-spacing: 0.05em;
}
.badge-sci { background: #dbeafe; color: #1d4ed8; }
.badge-particulier { background: #f3f4f6; color: #6b7280; }
.badge-indivision { background: #fef3c7; color: #d97706; }
.badge-sarl { background: #ede9fe; color: #7c3aed; }

.property-name { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
.property-address-small { font-size: 12px; color: var(--color-text-secondary); }

.property-lots-row {
  display: flex; gap: var(--space-md); flex-wrap: wrap;
  margin-top: 10px; padding-top: 10px;
  border-top: 1px solid var(--color-border-light);
}
.lot-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 99px;
  font-size: 11px; font-weight: 500;
  background: var(--color-bg); border: 1px solid var(--color-border);
}
.lot-chip.occupied { background: var(--color-success-light); border-color: var(--color-success); color: var(--color-success); }
.lot-chip.vacant { background: var(--color-warning-light); border-color: var(--color-warning); color: var(--color-warning); }

.unit-card {
  background: var(--color-surface);
  border-radius: var(--radius-lg);
  border: 1px solid var(--color-border);
  box-shadow: var(--shadow-sm);
  padding: var(--space-lg);
  transition: box-shadow 0.15s;
  cursor: pointer;
}
.unit-card:hover { box-shadow: var(--shadow-md); }
.unit-card.vacant { border-left: 3px solid var(--color-warning); }
.unit-card.occupied { border-left: 3px solid var(--color-success); }

.unit-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.unit-label { font-size: 14px; font-weight: 700; }
.unit-type { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
.unit-tenant { font-size: 13px; font-weight: 600; color: var(--color-primary); margin-top: 8px; }
.unit-vacant-text { font-size: 12px; color: var(--color-warning); margin-top: 8px; font-style: italic; }
.unit-footer { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--color-border-light); display: flex; justify-content: space-between; font-size: 11px; color: var(--color-text-tertiary); }

/* ── Mascotte & Chat ── */
.bailo-fab { position:fixed; bottom:24px; right:24px; z-index:9000; cursor:pointer; width:56px; height:56px; border-radius:50%; background:linear-gradient(135deg,#1a1208,#3a2a18); box-shadow:0 4px 20px rgba(0,0,0,.35); display:flex; align-items:center; justify-content:center; border:none; transition:transform .2s; }
.bailo-fab:hover { transform:scale(1.08); }
.bailo-fab img { width:38px; height:38px; border-radius:50%; object-fit:cover; }
.bailo-chat-win { position:fixed; bottom:90px; right:24px; z-index:9000; width:340px; max-width:calc(100vw - 32px); background:white; border-radius:16px; box-shadow:0 8px 40px rgba(0,0,0,.2); display:none; flex-direction:column; overflow:hidden; font-family:Inter,sans-serif; }
.bailo-chat-header { background:#1a1208; color:white; padding:14px 16px; display:flex; align-items:center; gap:10px; }
.bailo-chat-header img { width:32px; height:32px; border-radius:50%; }
.bailo-chat-header .title { font-size:14px; font-weight:700; }
.bailo-chat-header .sub { font-size:11px; opacity:.6; }
.bailo-chat-header .close-btn { margin-left:auto; background:none; border:none; color:white; font-size:18px; cursor:pointer; opacity:.7; padding:2px 6px; }
.bailo-chat-messages { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:10px; max-height:320px; min-height:120px; }
.bailo-msg-bot { background:#f1ede7; border-radius:12px 12px 12px 3px; padding:10px 12px; font-size:13px; line-height:1.5; max-width:85%; color:#1a1208; }
.bailo-msg-user { background:#1a1208; color:white; border-radius:12px 12px 3px 12px; padding:10px 12px; font-size:13px; line-height:1.5; max-width:85%; align-self:flex-end; }
.bailo-msg-typing { background:#f1ede7; border-radius:12px; padding:10px 14px; font-size:18px; letter-spacing:4px; color:#9a8a70; }
.bailo-chat-footer { padding:10px 12px; border-top:1px solid #e0d5c8; display:flex; gap:8px; }
.bailo-chat-footer input { flex:1; padding:8px 12px; border:1.5px solid #d4c8b8; border-radius:20px; font-size:13px; outline:none; }
.bailo-chat-footer input:focus { border-color:#e8793a; }
.bailo-chat-footer button { background:#e8793a; color:white; border:none; border-radius:50%; width:36px; height:36px; cursor:pointer; font-size:16px; flex-shrink:0; }
</style>
</head>
<body>

  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="logo-icon">🏠</span>
        <span class="logo-text">Bailo <strong>Gestion</strong></span>
      </div>
      <h2>Connexion</h2>
      <p class="auth-sub">Accédez à votre espace bailleur</p>
      <input type="email" id="auth-email" placeholder="Email" autocomplete="email" />
      <input type="password" id="auth-password" placeholder="Mot de passe" autocomplete="current-password" />
      <button id="auth-btn" class="btn-primary" onclick="handleAuth()">Se connecter</button>
      <div id="auth-error" class="auth-error hidden"></div>
      <p class="auth-footer">Pas encore de compte ? <a href="#">Essai gratuit</a></p>
    </div>
  </div>

  <!-- APP SHELL -->
  <div id="app" class="app hidden">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="logo-icon">🏠</span>
        <span class="logo-text">Bailo <strong>Gestion</strong></span>
        <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
      </div>

      <nav class="sidebar-nav">

        <!-- Dashboard seul, sans groupe -->
        <a href="#" class="nav-item active" data-page="dashboard" onclick="navigate('dashboard',this)">
          <span class="nav-icon">⊞</span>
          <span class="nav-label">Tableau de bord</span>
        </a>

        <div class="nav-group-label">Gestion</div>

        <a href="#" class="nav-item" data-page="properties" onclick="navigate('properties',this)">
          <span class="nav-icon">🏠</span>
          <span class="nav-label">Biens</span>
        </a>
        <a href="#" class="nav-item" data-page="tenants" onclick="navigate('tenants',this)">
          <span class="nav-icon">👤</span>
          <span class="nav-label">Locataires</span>
        </a>
        <a href="edl.html" class="nav-item" target="_blank">
          <span class="nav-icon">📋</span>
          <span class="nav-label">EDL</span>
        </a>
        <a href="compteurs.html" class="nav-item" target="_blank">
          <span class="nav-icon">💧</span>
          <span class="nav-label">Compteurs</span>
        </a>
        <a href="#" class="nav-item" data-page="leases" onclick="navigate('leases',this)">
          <span class="nav-icon">📄</span>
          <span class="nav-label">Baux</span>
        </a>

        <div class="nav-group-label">Finances</div>

        <a href="#" class="nav-item" data-page="receipts" onclick="navigate('receipts',this)">
          <span class="nav-icon">🧾</span>
          <span class="nav-label">Quittances</span>
        </a>
        <a href="#" class="nav-item" data-page="loyers" onclick="navigate('loyers',this)">
          <span class="nav-icon">💶</span>
          <span class="nav-label">Loyers</span>
        </a>
        <a href="#" class="nav-item" data-page="payments" onclick="navigate('payments',this)">
          <span class="nav-icon">🏦</span>
          <span class="nav-label">Banques</span>
        </a>

        <div class="nav-group-label">Communication</div>

        <a href="#" class="nav-item" data-page="messages" onclick="navigate('messages',this)">
          <span class="nav-icon">💬</span>
          <span class="nav-label">Messages</span>
          <span class="nav-badge hidden" id="badge-messages">!</span>
        </a>
        <a href="#" class="nav-item" data-page="documents" onclick="navigate('documents',this)">
          <span class="nav-icon">📋</span>
          <span class="nav-label">Documents</span>

          <span class="nav-icon">&#127968;</span>
          <span class="nav-label">CAF / APL</span>
          <span class="nav-badge hidden" id="badge-caf"></span>
        </a>
