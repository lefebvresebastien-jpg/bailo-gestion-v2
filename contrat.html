<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contrat de bail — Bailo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Georgia&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    :root {
      --accent: #e8793a;
      --ink: #1a110a;
      --ink-2: #4a3728;
      --ink-3: #8a7060;
      --surface: #fdfaf6;
      --border: rgba(56,37,17,0.12);
      --r-xl: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, serif; background: #f0ebe4; color: var(--ink); }

    /* Toolbar */
    .toolbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: #1a110a; color: #fff;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px; gap: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .toolbar-left { display: flex; align-items: center; gap: 12px; }
    .toolbar-title { font-family: Inter, sans-serif; font-size: 15px; font-weight: 600; }
    .toolbar-sub { font-size: 12px; opacity: 0.6; font-family: Inter, sans-serif; }
    .btn-back {
      background: rgba(255,255,255,0.1); color: #fff;
      border: none; padding: 7px 14px; border-radius: 8px;
      font-size: 13px; cursor: pointer; font-family: Inter, sans-serif;
      transition: background 0.15s;
    }
    .btn-back:hover { background: rgba(255,255,255,0.2); }
    .btn-print {
      background: var(--accent); color: #fff;
      border: none; padding: 8px 20px; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      font-family: Inter, sans-serif; transition: opacity 0.15s;
    }
    .btn-print:hover { opacity: 0.9; }

    /* Loading */
    .loading {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; flex-direction: column; gap: 16px;
      font-family: Inter, sans-serif; color: var(--ink-3);
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(0,0,0,0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Contrat */
    .page-wrapper {
      max-width: 860px; margin: 0 auto;
      padding: 80px 24px 48px;
    }

    .contract-preview {
      background: var(--surface);
      color: var(--ink);
      border-radius: var(--r-xl);
      padding: 40px 48px;
      font-family: Georgia, serif;
      line-height: 1.75;
      border: 1px solid var(--border);
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .contract-header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 20px;
      margin-bottom: 24px;
      text-align: center;
    }
    .contract-header p:first-child {
      text-transform: uppercase;
      letter-spacing: .15em;
      font-size: .7rem;
      opacity: .55;
      margin-bottom: 8px;
      font-family: Inter, sans-serif;
    }
    .contract-header h3 {
      font-size: 1.8rem;
      font-family: "Instrument Serif", Georgia, serif;
      margin-bottom: 6px;
    }
    .contract-preview section + section { margin-top: 20px; }
    .contract-preview h4 {
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 6px;
      font-family: Inter, sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      padding-bottom: 4px;
    }
    .contract-preview p { margin-bottom: 8px; font-size: 0.92rem; }
    .contract-preview ul { padding-left: 20px; margin-bottom: 8px; }
    .contract-preview li { font-size: 0.92rem; margin-bottom: 4px; }
    .contract-preview strong { color: var(--ink); }

    /* Signature */
    .signature-section {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 2px solid var(--border);
    }
    .signature-section h4 {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent);
      margin-bottom: 16px;
      font-family: Inter, sans-serif;
    }
    .signature-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
    }
    .sig-box { display: flex; flex-direction: column; gap: 8px; }
    .sig-label {
      font-size: 12px;
      font-family: Inter, sans-serif;
      font-weight: 600;
      color: var(--ink-2);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .sig-name { font-size: 13px; color: var(--ink-3); font-family: Inter, sans-serif; }
    canvas.sig-canvas {
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: #fff;
      cursor: crosshair;
      touch-action: none;
      display: block;
      width: 100%;
      height: 120px;
    }
    .sig-actions {
      display: flex; gap: 8px; margin-top: 4px;
    }
    .btn-sig-clear {
      font-size: 11px; padding: 4px 10px;
      border: 1px solid var(--border); border-radius: 6px;
      background: #fff; cursor: pointer;
      font-family: Inter, sans-serif; color: var(--ink-3);
    }
    .btn-sig-clear:hover { background: #f5f0eb; }
    .sig-date {
      font-size: 12px; color: var(--ink-3);
      font-family: Inter, sans-serif; margin-top: 4px;
    }
    .contract-footer {
      margin-top: 24px; padding: 12px 16px;
      background: rgba(56,37,17,0.04);
      border-radius: 8px;
      font-size: 0.75rem; color: var(--ink-3);
      font-family: Inter, sans-serif;
      line-height: 1.5;
    }

    /* Print */
    @media print {
      .toolbar { display: none !important; }
      .page-wrapper { padding: 0; max-width: 100%; }
      .contract-preview { border-radius: 0; box-shadow: none; border: none; padding: 20px; }
      body { background: white; }
      canvas.sig-canvas { border: 1px solid #ccc; }
      .sig-actions { display: none; }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .contract-preview { padding: 20px; }
      .signature-grid { grid-template-columns: 1fr; }
      .toolbar { padding: 10px 16px; }
    }
  </style>
</head>
<body>

  <div class="toolbar">
    <div class="toolbar-left">
      <button class="btn-back" onclick="window.close()">← Retour</button>
      <div>
        <div class="toolbar-title" id="toolbar-title">Contrat de bail</div>
        <div class="toolbar-sub" id="toolbar-sub">Chargement…</div>
      </div>
    </div>
    <button class="btn-print" onclick="window.print()">🖨️ Imprimer / PDF</button>
  </div>

  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Chargement du contrat…</p>
  </div>

  <div id="page-wrapper" class="page-wrapper" style="display:none">
    <div class="contract-preview" id="print-area">
      <!-- Injecté dynamiquement -->
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://nltuysmnxsomlhgvbtwz.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5sdHV5c21ueHNvbWxoZ3ZidHd6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDAyOTUsImV4cCI6MjA5MjI3NjI5NX0.ekmk4ujs0H1UfuDopnd_RNop1obgZgRM3ilj0yzqgM0';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const CONTRACT_TEMPLATE = '<div class="card contract-preview" id="print-area">\n        <div class="contract-header">\n          <p style="text-transform:uppercase;letter-spacing:.15em;font-size:.7rem;opacity:.55;margin-bottom:6px">Contrat de bail d\'habitation — Loi n° 89-462 du 6 juillet 1989</p>\n          <h3 data-bind="leaseType">Location vide</h3>\n          <p style="margin-top:6px">Signé à <span data-bind="signatureCity">—</span>, le <span data-bind="signatureDate">—</span></p>\n        </div>\n\n        <!-- Art 1 -->\n        <section>\n          <h4>Article 1 — Parties au contrat</h4>\n          <p><strong>Le bailleur :</strong> <strong data-bind="landlordName">—</strong>, domicilié au <span data-bind="landlordAddress">—</span>, représenté par <span data-bind="landlordRepresentative">—</span>, joignable à <span data-bind="landlordEmail">—</span>, ci-après dénommé « le Bailleur ».</p>\n          <p style="margin-top:8px"><strong>Le locataire :</strong> <strong data-bind="tenantName">—</strong>, né(e) le <span data-bind="tenantDOB">—</span>, pièce d\'identité <span data-bind="tenantIdDoc">—</span>, demeurant actuellement au <span data-bind="tenantAddress">—</span>, joignable au <span data-bind="tenantPhone">—</span> et à <span data-bind="tenantEmail">—</span><span id="tenant2-bail-text"></span>, ci-après dénommé(s) « le Locataire ».</p>\n          <p style="margin-top:8px"><strong>Le garant :</strong> <span data-bind="guarantorName">Aucun garant renseigné</span> — type de caution : <span data-bind="guarantorType">—</span>, domicilié au <span data-bind="guarantorAddress">—</span>, pièce d\'identité <span data-bind="guarantorIdDoc">—</span>. Le garant s\'engage solidairement et indivisiblement avec le Locataire au paiement des loyers, charges, réparations locatives et indemnités d\'occupation pour la durée du bail et de ses renouvellements éventuels.</p>\n        </section>\n\n        <!-- Art 2 -->\n        <section>\n          <h4>Article 2 — Désignation du logement</h4>\n          <p>Le présent bail porte sur un logement situé au <strong data-bind="propertyAddress">—</strong> (<span data-bind="propertyFloor">—</span>), référence cadastrale / lot : <span data-bind="propertyCadastral">—</span>. Le logement est composé de <span data-bind="rooms">—</span> pièce(s) principale(s) pour une surface habitable de <strong data-bind="surface">—</strong> (mesurée conformément à la loi Carrez). Le chauffage est de type <span data-bind="heatingType">—</span> ; l\'eau chaude sanitaire est <span data-bind="hotWaterType">—</span>. La classe énergétique DPE est : <strong data-bind="dpeClass">—</strong>. Le Locataire déclare avoir visité les lieux et les accepter en l\'état tel que décrit à l\'état des lieux annexé.</p>\n        </section>\n\n        <!-- Art 3 -->\n        <section>\n          <h4>Article 3 — Durée, prise d\'effet et restitution</h4>\n          <p>Le présent contrat est conclu pour une durée de <strong data-bind="duration">—</strong>, prenant effet le <strong data-bind="effectiveDate">—</strong>. À l\'expiration de cette durée, le bail se renouvelle par tacite reconduction pour une durée identique, sauf congé délivré dans les formes et délais légaux. Le préavis applicable au Locataire est de <span data-bind="noticePeriodTenant">—</span> ; celui applicable au Bailleur est de <span data-bind="noticePeriodLandlord">—</span>. Le congé doit être notifié par lettre recommandée avec avis de réception, par acte d\'huissier ou par remise en main propre contre récépissé.</p>\n          <p id="exit-date-block" style="margin-top:8px;display:none"><strong>Date de sortie effective :</strong> <span data-bind="exitDate">—</span>. <span id="exit-keys-text"></span> Le dépôt de garantie est restituable dans un délai légal à compter de la remise des clés et de la signature de l\'état des lieux de sortie.</p>\n        </section>\n\n        <!-- Art 4 -->\n        <section>\n          <h4>Article 4 — Loyer et révision</h4>\n          <p>Le loyer mensuel hors charges est fixé à <strong data-bind="rent">0 €</strong>. Il est payable <span data-bind="rentDueDay">—</span>, par <span data-bind="paymentTerms">—</span>. Référence IRL applicable à la date de signature : <span data-bind="irlReference">—</span>. Le Bailleur se réserve le droit de réviser le loyer une fois par an à la date anniversaire du bail, en application de l\'article 17-1 de la loi du 6 juillet 1989, par référence à la variation de l\'Indice de Référence des Loyers (IRL) publié par l\'INSEE, dans la limite du plafond légal en vigueur.</p>\n          <p style="margin-top:6px">Zone encadrée — loyer de référence : <span data-bind="rentReference">non applicable</span>.</p>\n        </section>\n\n        <!-- Art 5 -->\n        <section>\n          <h4>Article 5 — Charges locatives et régularisation</h4>\n          <p>Les charges récupérables sont fixées à <strong data-bind="charges">0 €</strong> par mois selon le régime suivant : <span data-bind="chargesRegime">Provision sur charges avec régularisation annuelle</span>. En cas de provision, le Bailleur communique au Locataire, dans le mois suivant chaque arrêté annuel des comptes, le décompte des charges par nature, le montant de la régularisation exigible ou à rembourser, ainsi que, pour les immeubles en copropriété, les documents justificatifs. Toute somme due au titre de la régularisation est exigible dans un délai de deux mois suivant l\'envoi du décompte.</p>\n        </section>\n\n        <!-- Art 6 -->\n        <section>\n          <h4>Article 6 — Dépôt de garantie</h4>\n          <p>Un dépôt de garantie de <strong data-bind="deposit">0 €</strong> est versé par le Locataire à la signature des présentes, représentant au plus deux mois de loyer hors charges conformément à l\'article 22 de la loi du 6 juillet 1989. Ce dépôt ne porte pas intérêt au profit du Locataire. Il est restitué dans un délai maximal de un mois si l\'état des lieux de sortie est conforme à celui d\'entrée, ou de deux mois en cas de dégradations imputables au Locataire, déduction faite des sommes restant dues ou des réparations justifiées par devis ou factures. À défaut de restitution dans les délais légaux, le Bailleur est redevable d\'une majoration de 10 % du loyer mensuel hors charges par mois de retard entamé.</p>\n        </section>\n\n        <!-- Art 7 -->\n        <section>\n          <h4>Article 7 — Remise des clés</h4>\n          <p><span data-bind="keysCount">—</span> jeu(x) de clés sont remis au Locataire à la date d\'entrée dans les lieux, contre signature de l\'état des lieux d\'entrée. Toute duplication de clé est autorisée pour usage personnel uniquement et ne confère aucun droit à une tierce personne. En cas de perte ou de remplacement de serrure sans accord du Bailleur, les frais de remise en état sont à la charge du Locataire.</p>\n        </section>\n\n        <!-- Art 8 -->\n        <section>\n          <h4>Article 8 — Obligations du Locataire</h4>\n          <p><strong>Usage exclusif :</strong> Le logement est destiné à l\'usage exclusif de résidence principale du Locataire et des personnes expressément désignées. Toute activité professionnelle ou commerciale est soumise à autorisation écrite préalable du Bailleur.</p>\n          <p style="margin-top:6px"><strong>Entretien et réparations locatives :</strong> Le Locataire prend à sa charge l\'entretien courant et les réparations locatives tels que définis par le décret n° 87-712 du 26 août 1987, notamment le maintien en état de propreté des locaux, le remplacement des équipements de menue importance (joints, ampoules, filtres, etc.) et l\'entretien des installations (robinetterie, serrures, volets). Toute dégradation résultant d\'un défaut d\'entretien est réparée aux frais exclusifs du Locataire.</p>\n          <p style="margin-top:6px"><strong>Signalement obligatoire :</strong> Le Locataire est tenu de signaler sans délai au Bailleur par écrit tout désordre, sinistre, infiltration ou dégradation susceptible d\'aggraver le dommage. Le défaut de signalement engage la responsabilité du Locataire pour les dommages supplémentaires qui en résultent.</p>\n          <p style="margin-top:6px"><strong>Interdiction de transformation :</strong> Aucune transformation, démolition, percement ou modification de l\'installation électrique, plomberie ou structure ne peut être réalisée sans accord écrit du Bailleur. En fin de bail, le Locataire restitue le logement dans l\'état décrit à l\'état des lieux d\'entrée, vétusté normale exclue. Les travaux non autorisés sont remis en état aux frais du Locataire, ou conservés par le Bailleur sans indemnité.</p>\n          <p style="margin-top:6px"><strong>Interdiction de sous-location et cession :</strong> Toute sous-location totale ou partielle, à titre onéreux ou gratuit, y compris via une plateforme numérique (Airbnb, Abritel, etc.), est formellement interdite sans accord écrit préalable du Bailleur. Toute cession du bail est également interdite. Toute violation de cette clause constitue un motif de résiliation.</p>\n        </section>\n\n        <!-- Art 9 -->\n        <section>\n          <h4>Article 9 — Assurance habitation</h4>\n          <p>Le Locataire est tenu de souscrire et de maintenir, pour toute la durée du bail, une assurance multirisques habitation garantissant les risques locatifs (incendie, dégâts des eaux, explosion) conformément à l\'article 7 de la loi du 6 juillet 1989. Une attestation d\'assurance est remise au Bailleur avant toute remise des clés, puis à chaque renouvellement annuel et à première demande. À défaut de remise de l\'attestation dans un délai de un mois après mise en demeure, le Bailleur est en droit de souscrire une assurance pour le compte du Locataire dont le montant sera récupérable à titre de charge, ou d\'engager la procédure de résiliation prévue à l\'article 10.</p>\n        </section>\n\n        <!-- Art 10 -->\n        <section>\n          <h4>Article 10 — Clause résolutoire et sanctions</h4>\n          <p>Conformément à l\'article 24 de la loi du 6 juillet 1989, le présent bail est résilié de plein droit, après commandement de payer demeuré infructueux pendant deux mois, dans les cas suivants : défaut de paiement du loyer ou des charges aux termes convenus ; non-versement du dépôt de garantie ; défaut de production de l\'attestation d\'assurance habitation.</p>\n          <p style="margin-top:6px">En cas de retard de paiement supérieur à <span data-bind="rentDueDay">—</span> jours, des pénalités de retard sont applicables : <span data-bind="latePenalty">intérêts légaux majorés à compter du 8ème jour de retard</span>. Ces pénalités s\'appliquent de plein droit, sans mise en demeure préalable. Le Bailleur se réserve en outre le droit de réclamer le remboursement de tous frais engagés pour le recouvrement (frais d\'huissier, frais judiciaires).</p>\n        </section>\n\n        <!-- Art 11 -->\n        <section>\n          <h4>Article 11 — Solidarité et indivisibilité</h4>\n          <p>En cas de pluralité de Locataires, ceux-ci sont tenus solidairement et indivisiblement au paiement de l\'intégralité du loyer, des charges et de toutes sommes dues au Bailleur, ainsi qu\'à l\'exécution de toutes les obligations du présent bail. Le départ de l\'un des Locataires ne libère pas les autres ni le garant de leurs obligations, sauf accord écrit du Bailleur. Le garant est engagé solidairement avec le(s) Locataire(s) dans les mêmes conditions et pour la même durée, y compris en cas de renouvellement tacite du bail, dans la limite de trois renouvellements.</p>\n        </section>\n\n        <!-- Art 12 -->\n        <section>\n          <h4>Article 12 — Abandon du logement</h4>\n          <p>En cas d\'abandon manifeste du logement par le Locataire, caractérisé par la réunion d\'éléments laissant supposer que les lieux sont abandonnés (absence prolongée, courrier non relevé, loyers impayés, etc.), le Bailleur peut mettre en œuvre la procédure prévue à l\'article 14-1 de la loi du 6 juillet 1989, après constat d\'huissier et mise en demeure par lettre recommandée restée sans effet pendant un mois. Le logement est alors repris de plein droit, les objets abandonnés étant traités conformément à la loi.</p>\n        </section>\n\n        <!-- Art 13 -->\n        <section>\n          <h4>Article 13 — Visites et accès aux lieux</h4>\n          <p>En cas de mise en vente ou de relocation du logement, le Locataire autorise la visite des lieux dans les conditions suivantes : au maximum deux heures par jour ouvrable, aux jours et créneaux convenus entre les parties, à l\'exclusion des dimanches et jours fériés. En cas d\'urgence (sinistre, risque de dommage grave), le Bailleur ou son représentant peut accéder aux lieux après notification préalable d\'un délai raisonnable, sauf péril imminent.</p>\n        </section>\n\n        <!-- Art 14 -->\n        <section>\n          <h4>Article 14 — Obligations du Bailleur</h4>\n          <p>Le Bailleur s\'engage à délivrer au Locataire un logement décent au sens du décret n° 2002-120 du 30 janvier 2002, à assurer la jouissance paisible des lieux loués, à prendre en charge les réparations autres que locatives nécessaires au maintien en bon état du logement, et à ne pas s\'opposer aux aménagements légers réalisés par le Locataire qui ne constituent pas une transformation. Le Bailleur est tenu d\'entretenir les équipements mentionnés au bail et de réaliser, dans un délai raisonnable, les travaux dont il a été informé par écrit par le Locataire.</p>\n        </section>\n\n        <!-- Art 15 -->\n        <section>\n          <h4>Article 15 — Clauses de protection intégrées</h4>\n          <div id="generated-clauses" class="generated-clauses"></div>\n        </section>\n\n        <!-- Art 16 -->\n        <section>\n          <h4>Article 16 — Clauses particulières</h4>\n          <p data-bind="specialClauses">Aucune clause particulière n\'a été renseignée.</p>\n        </section>\n\n        <!-- Art 17 -->\n        <section>\n          <h4>Article 17 — Annexes remises et conditions suspensives</h4>\n          <div class="generated-clauses">\n            <article>\n              <h5>Documents remis au locataire</h5>\n              <p data-bind="annexesProvided">Aucune annexe détaillée.</p>\n            </article>\n            <article>\n              <h5>Conditions suspensives</h5>\n              <p data-bind="suspensiveConditions">Aucune condition suspensive particulière.</p>\n            </article>\n            <article>\n              <h5>Informations complémentaires</h5>\n              <p data-bind="additionalInformation">Aucune information complémentaire.</p>\n            </article>\n          </div>\n        </section>\n\n        <!-- Art 18 -->\n        <section>\n          <h4>Article 18 — État des lieux</h4>\n          <div id="annex-preview" class="annex-preview">\n            <div class="annex-room"><p>Aucun état des lieux renseigné.</p></div>\n          </div>\n        </section>\n\n        <!-- Art 19 -->\n        <section>\n          <h4>Article 19 — Analyse de solvabilité (usage interne bailleur)</h4>\n          <div id="eligibility-preview" class="generated-clauses"></div>\n        </section>\n\n        <!-- Art 20 -->\n        <section>\n          <h4>Article 20 — Attribution de juridiction</h4>\n          <p>Pour l\'exécution du présent contrat, les parties font élection de domicile en leurs adresses respectives indiquées ci-dessus. En cas de litige, les parties s\'engagent à tenter une conciliation préalable auprès d\'un conciliateur de justice. À défaut d\'accord, le Tribunal judiciaire du lieu de situation de l\'immeuble sera seul compétent, nonobstant pluralité de défendeurs ou appel en garantie.</p>\n        </section>\n\n        <section class="signatures" style="margin-top:32px">\n          <div>\n            <h4>Le Bailleur</h4>\n            <p data-bind="landlordSigner" style="margin-top:4px;font-size:.85rem;color:#7a5a40">—</p>\n            <p style="font-size:.78rem;color:#9a7a60;margin-top:4px">Lu et approuvé — Bon pour accord</p>\n            <button class="inline-btn" data-sig-role="bailleur" style="margin-top:8px;font-size:.76rem;color:var(--accent);border-color:rgba(232,121,58,.3)">✍️ Signer manuellement</button>\n            <span class="signature-line"></span>\n          </div>\n          <div>\n            <h4>Le Locataire</h4>\n            <p data-bind="tenantSigner" style="margin-top:4px;font-size:.85rem;color:#7a5a40">—</p>\n            <p style="font-size:.78rem;color:#9a7a60;margin-top:4px">Lu et approuvé — Bon pour accord</p>\n            <button class="inline-btn" data-sig-role="locataire" style="margin-top:8px;font-size:.76rem;color:var(--accent);border-color:rgba(232,121,58,.3)">✍️ Signer manuellement</button>\n            <span class="signature-line"></span>\n          </div>\n          <div>\n            <h4>Le Garant</h4>\n            <p data-bind="guarantorName" style="margin-top:4px;font-size:.85rem;color:#7a5a40">—</p>\n            <p style="font-size:.78rem;color:#9a7a60;margin-top:4px">Lu et approuvé — Caution solidaire</p>\n            <button class="inline-btn" data-sig-role="garant" style="margin-top:8px;font-size:.76rem;color:var(--accent);border-color:rgba(232,121,58,.3)">✍️ Signer manuellement</button>\n            <span class="signature-line"></span>\n          </div>\n        </section>\n\n        <!-- ═══ SIGNATURE ELECTRONIQUE SIGNWELL ═══════════════════ -->\n        <div id="signwell-block" style="margin-top:24px;padding:18px;background:#f0f7ff;border:1px solid #b0d0f0;border-radius:12px;">\n          <h4 style="font-family:\'Cabinet Grotesk\',sans-serif;font-size:.82rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#1a3a6a;margin-bottom:10px">✉️ Signature électronique légale</h4>\n          <p style="font-size:.8rem;color:#2a4a7a;line-height:1.6;margin-bottom:12px">Envoyez le bail par email pour signature électronique à valeur légale (eIDAS). Chaque signataire recevra un lien sécurisé pour signer depuis son téléphone ou ordinateur.</p>\n          <div id="signwell-status" style="display:none;padding:10px 14px;border-radius:8px;font-size:.8rem;margin-bottom:12px;line-height:1.5"></div>\n          <button id="btn-signwell" onclick="envoyerSignatureSignWell()" style="background:#1a3a6a;color:white;border:none;padding:10px 20px;border-radius:8px;font-size:.84rem;font-weight:600;cursor:pointer;font-family:\'Cabinet Grotesk\',sans-serif">\n            📧 Envoyer pour signature électronique\n          </button>\n          <div id="signwell-signers" style="margin-top:14px;display:none"></div>\n        </div>\n\n        <p style="margin-top:24px;font-size:.72rem;color:#b09070;text-align:center;line-height:1.6">Document généré par Bailo Studio — à valeur indicative. Ce bail s\'appuie sur la loi n° 89-462 du 6 juillet 1989 et ses textes d\'application. Nous recommandons une vérification par un professionnel du droit avant signature.</p>\n      </div>';

    function formatDate(str) {
      if (!str) return '—';
      try {
        return new Intl.DateTimeFormat('fr-FR').format(new Date(str));
      } catch(e) { return str; }
    }

    function formatCurrency(v) {
      if (!v) return '—';
      return new Intl.NumberFormat('fr-FR', {style:'currency', currency:'EUR', maximumFractionDigits:0}).format(parseFloat(v));
    }

    function fillTemplate(template, f) {
      var html = template;
      var values = {
        leaseType: f.leaseType || 'Location vide',
        signatureCity: f.signatureCity || '—',
        signatureDate: f.signatureDate ? formatDate(f.signatureDate) : '—',
        landlordName: f.landlordName || '—',
        landlordAddress: f.landlordAddress || '—',
        landlordRepresentative: f.landlordRepresentative || '—',
        landlordEmail: f.landlordEmail || '—',
        landlordSigner: f.landlordName || '—',
        tenantName: f.tenantName || '—',
        tenantDOB: f.tenantDOB ? formatDate(f.tenantDOB) : '—',
        tenantIdDoc: f.tenantIdDoc || '—',
        tenantAddress: f.tenantAddress || '—',
        tenantEmail: f.tenantEmail || '—',
        tenantPhone: f.tenantPhone || '—',
        tenantSigner: f.tenantName || '—',
        guarantorName: f.guarantorName || '—',
        guarantorType: f.guarantorType || '—',
        guarantorAddress: f.guarantorAddress || '—',
        guarantorIdDoc: f.guarantorIdDoc || '—',
        propertyAddress: f.propertyAddress || '—',
        propertyFloor: f.propertyFloor || '—',
        propertyCadastral: f.propertyCadastral || '—',
        surface: f.surface || '—',
        rooms: f.rooms || '—',
        dpeClass: f.dpeClass || '—',
        heatingType: f.heatingType || '—',
        hotWaterType: f.hotWaterType || '—',
        keysCount: f.keysCount || '2',
        effectiveDate: f.effectiveDate ? formatDate(f.effectiveDate) : '—',
        exitDate: f.exitDate ? formatDate(f.exitDate) : '',
        duration: f.duration || '3 ans renouvelables par tacite reconduction',
        noticePeriodTenant: f.noticePeriodTenant || '3 mois',
        noticePeriodLandlord: f.noticePeriodLandlord || '6 mois',
        rent: formatCurrency(f.rent),
        charges: formatCurrency(f.charges),
        deposit: formatCurrency(f.deposit || f.rent),
        chargesRegime: f.chargesRegime || '—',
        rentDueDay: f.rentDueDay || 'Le 1 de chaque mois',
        paymentTerms: f.paymentTerms || 'Par virement bancaire',
        irlReference: f.irlReference || '—',
        rentReference: f.rentReference || '—',
        latePenalty: f.latePenalty || '—',
        annexesProvided: f.annexesProvided || 'DPE, état des risques, état des lieux',
        specialClauses: f.specialClauses || 'Néant.',
        suspensiveConditions: f.suspensiveConditions || 'Néant.',
        additionalInformation: f.additionalInformation || '',
      };

      // Remplacer data-bind par les valeurs
      Object.keys(values).forEach(function(key) {
        var re = new RegExp('data-bind="' + key + '">[^<]*', 'g');
        html = html.replace(re, 'data-bind="' + key + '">' + values[key]);
      });

      return html;
    }

    function addSignatureSection(f) {
      var today = new Intl.DateTimeFormat('fr-FR').format(new Date());
      return '<div class="signature-section">' +
        '<h4>Signatures</h4>' +
        '<p style="font-size:13px;font-family:Inter,sans-serif;color:#8a7060;margin-bottom:16px">Fait à ' + (f.signatureCity || '______') + ', le ' + today + ', en deux exemplaires originaux.</p>' +
        '<div class="signature-grid">' +
          '<div class="sig-box">' +
            '<span class="sig-label">Le Bailleur</span>' +
            '<span class="sig-name">' + (f.landlordName || '') + '</span>' +
            '<canvas class="sig-canvas" id="sig-bailleur" width="400" height="120"></canvas>' +
            '<div class="sig-actions"><button class="btn-sig-clear" onclick="clearSig('sig-bailleur')">Effacer</button></div>' +
            '<div class="sig-date">Lu et approuvé</div>' +
          '</div>' +
          '<div class="sig-box">' +
            '<span class="sig-label">Le Locataire</span>' +
            '<span class="sig-name">' + (f.tenantName || '') + '</span>' +
            '<canvas class="sig-canvas" id="sig-locataire" width="400" height="120"></canvas>' +
            '<div class="sig-actions"><button class="btn-sig-clear" onclick="clearSig('sig-locataire')">Effacer</button></div>' +
            '<div class="sig-date">Lu et approuvé</div>' +
          '</div>' +
        '</div>' +
      '</div>';
    }

    function initSignatureCanvas(canvasId) {
      var canvas = document.getElementById(canvasId);
      if (!canvas) return;
      var ctx = canvas.getContext('2d');
      var drawing = false;
      var lastX = 0, lastY = 0;

      function getPos(e) {
        var rect = canvas.getBoundingClientRect();
        var scaleX = canvas.width / rect.width;
        var scaleY = canvas.height / rect.height;
        if (e.touches) {
          return {
            x: (e.touches[0].clientX - rect.left) * scaleX,
            y: (e.touches[0].clientY - rect.top) * scaleY
          };
        }
        return {
          x: (e.clientX - rect.left) * scaleX,
          y: (e.clientY - rect.top) * scaleY
        };
      }

      ctx.strokeStyle = '#1a110a';
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      canvas.addEventListener('mousedown', function(e) {
        drawing = true;
        var p = getPos(e);
        lastX = p.x; lastY = p.y;
        ctx.beginPath(); ctx.moveTo(lastX, lastY);
      });
      canvas.addEventListener('mousemove', function(e) {
        if (!drawing) return;
        var p = getPos(e);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
        lastX = p.x; lastY = p.y;
      });
      canvas.addEventListener('mouseup', function() { drawing = false; });
      canvas.addEventListener('mouseleave', function() { drawing = false; });
      canvas.addEventListener('touchstart', function(e) {
        e.preventDefault(); drawing = true;
        var p = getPos(e); lastX = p.x; lastY = p.y;
        ctx.beginPath(); ctx.moveTo(lastX, lastY);
      }, {passive: false});
      canvas.addEventListener('touchmove', function(e) {
        e.preventDefault(); if (!drawing) return;
        var p = getPos(e);
        ctx.lineTo(p.x, p.y); ctx.stroke();
        lastX = p.x; lastY = p.y;
      }, {passive: false});
      canvas.addEventListener('touchend', function() { drawing = false; });
    }

    function clearSig(id) {
      var canvas = document.getElementById(id);
      if (!canvas) return;
      canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
    }

    async function loadAndRender() {
      var params = new URLSearchParams(window.location.search);
      var leaseId = params.get('lease');

      if (!leaseId) {
        document.getElementById('loading').innerHTML = '<p style="font-family:Inter,sans-serif;color:red">Aucun bail spécifié.</p>';
        return;
      }

      // Charger le bail depuis Supabase
      var resp = await db.from('leases').select('id, data').eq('id', leaseId).single();
      var lease = resp.data;

      if (!lease) {
        document.getElementById('loading').innerHTML = '<p style="font-family:Inter,sans-serif;color:red">Bail introuvable.</p>';
        return;
      }

      var f = (lease.data && lease.data.formData) ? lease.data.formData : {};

      // Remplir le template
      var html = fillTemplate(CONTRACT_TEMPLATE, f);

      // Ajouter la section signatures
      html = html + addSignatureSection(f);

      // Injecter dans la page
      document.getElementById('print-area').innerHTML = html;

      // Mettre à jour toolbar
      document.getElementById('toolbar-title').textContent = f.tenantName || 'Contrat de bail';
      document.getElementById('toolbar-sub').textContent = f.propertyAddress || '';

      // Initialiser les canvas de signature
      initSignatureCanvas('sig-bailleur');
      initSignatureCanvas('sig-locataire');

      // Afficher
      document.getElementById('loading').style.display = 'none';
      document.getElementById('page-wrapper').style.display = 'block';
    }

    loadAndRender();
  </script>
